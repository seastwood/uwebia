{% extends 'public_base.html' %}

{% block title %}Change Password{% endblock %}

{% block head %}
<style>
    .public-account-card {
        width: min(460px, calc(100% - 28px));
        margin: 52px auto;
        padding: 22px;

        background: rgba(0,0,0,0.34);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 20px;
        box-shadow: 0 18px 38px rgba(0,0,0,0.24);

        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
    }

    .public-account-card h1 {
        margin-top: 0;
    }

    .public-account-card input {
        width: 100%;
        margin-bottom: 12px;
        padding: 12px;

        border-radius: 14px;
        border: 1px solid rgba(255,255,255,0.18);

        background: rgba(255,255,255,0.1);
        color: inherit;
        font: inherit;
    }

    .public-account-card button {
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.16);

        background: rgba(255,255,255,0.12);
        color: inherit;

        font-weight: 850;
        cursor: pointer;
    }

    .public-account-card button:hover {
        background: rgba(126,226,204,0.14);
        border-color: rgba(126,226,204,0.34);
    }
</style>
{% endblock %}

{% block content %}
<form class="public-account-card" method="POST">
    <h1>Change Password</h1>

    <div class="pw-wrap">
        <input name="current_password" type="password" placeholder="Current password" required>
        <button type="button" class="pw-toggle" onclick="pwToggle(this)" aria-label="Show password" tabindex="-1"><i class="fas fa-eye"></i></button>
    </div>
    <div class="pw-wrap">
        <input name="new_password" type="password" placeholder="New password" required>
        <button type="button" class="pw-toggle" onclick="pwToggle(this)" aria-label="Show password" tabindex="-1"><i class="fas fa-eye"></i></button>
    </div>
    <div class="pw-wrap">
        <input name="confirm_password" type="password" placeholder="Confirm new password" required>
        <button type="button" class="pw-toggle" onclick="pwToggle(this)" aria-label="Show password" tabindex="-1"><i class="fas fa-eye"></i></button>
    </div>

    <button type="submit">Update Password</button>
</form>
{% endblock %}
