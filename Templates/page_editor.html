    .toggle-switch {
        display: flex;
        align-items: center;
        gap: 5px;
    }

    .toggle-switch input[type="checkbox"] {
        display: none;
    }

    .toggle-switch label {
        position: relative;
        display: inline-block;
        width: 40px;
        height: 20px;
        background-color: #ccc;
        border-radius: 20px;
        cursor: pointer;
    }

    .toggle-switch label::after {
        content: '';
        position: absolute;
        width: 18px;
        height: 18px;
        background-color: #ffffff;
        border-radius: 50%;
        top: 1px;
        left: 1px;
        transition: all 0.3s;
    }

    .toggle-switch input[type="checkbox"]:checked+label::after {
        transform: translateX(20px);
    }

    .toggle-switch input[type="checkbox"]:checked+label {
        background-color: #4CAF50;
    }

    /* WebKit-based browsers */
    ::-webkit-scrollbar {
        width: 12px;
        /* Width of the scrollbar */
        height: 12px;
        /* Height of the scrollbar */
    }

    ::-webkit-scrollbar-track {
        background: #333;
        /* Dark background for the scrollbar track */
    }

    ::-webkit-scrollbar-thumb {
        background-color: #555;
        /* Darker color for the scrollbar thumb */
        border-radius: 10px;
        /* Rounded corners for the scrollbar thumb */
        border: 3px solid #333;
        /* Adds space around the thumb and makes it look better */
    }

    ::-webkit-scrollbar-thumb:hover {
        background: #777;
        /* Lighter color when hovering over the scrollbar thumb */
    }

    /* Firefox */
    * {
        scrollbar-width: thin;
        /* Thin scrollbar width */
        scrollbar-color: #555 #333;
        /* Thumb color and track color */
    }

    /* Scrollbar for specific elements */
    .scrollable-element {
        scrollbar-width: thin;
        /* Thin scrollbar width */
        scrollbar-color: #555 #333;
        /* Thumb color and track color */
    }

    /* Styling the scrollbar for specific elements in WebKit-based browsers */
    .scrollable-element::-webkit-scrollbar {
        width: 12px;
        /* Width of the scrollbar */
        height: 12px;
        /* Height of the scrollbar */
    }

    .scrollable-element::-webkit-scrollbar-track {
        background: #333;
        /* Dark background for the scrollbar track */
    }

    .scrollable-element::-webkit-scrollbar-thumb {
        background-color: #555;
        /* Darker color for the scrollbar thumb */
        border-radius: 10px;
        /* Rounded corners for the scrollbar thumb */
        border: 3px solid #333;
        /* Adds space around the thumb and makes it look better */
    }

    .scrollable-element::-webkit-scrollbar-thumb:hover {
        background: #777;
        /* Lighter color when hovering over the scrollbar thumb */
    }
</style>

<style>

    .switch-label {

        cursor: pointer;

    }

    .switch-label .slider {

    <!-- Iframe of public page -->
    <script>
        // Function to get the preview URL
        function getPreviewUrl(websiteId, pageId) {
            return `${window.location.origin}/preview_page/${websiteId}/${pageId}`;
        }

        // Function to update the iframe with the preview URL
        function updatePublicView() {
            var publicFrame = document.getElementById('publicFrame');
            var websiteId = publicFrame.getAttribute('data-website-id');
            var pageId = publicFrame.getAttribute('data-page-id');
            publicFrame.src = getPreviewUrl(websiteId, pageId);
        }

        // Set the iframe data attributes for website and page IDs
        document.addEventListener('DOMContentLoaded', function () {
            var publicFrame = document.getElementById('publicFrame');
            publicFrame.setAttribute('data-website-id', '{{ website.id }}');
            publicFrame.setAttribute('data-page-id', '{{ page_id }}');
            updatePublicView();
        });

        // Add event listener to the Refresh button
        document.getElementById("refreshButton").addEventListener("click", reloadIframe);

        // Function to reload the iframe and maintain scroll position
        function reloadIframe() {
            const iframe = document.getElementById("publicFrame");
            const scrollPosition = iframe.contentWindow.scrollY;

            iframe.addEventListener("load", function () {
                iframe.contentWindow.scrollTo(0, scrollPosition);
            }, { once: true });

            iframe.contentWindow.location.reload(true);
        }
        // Define the sections array in the global scope
        let sections = [];



        document.addEventListener('DOMContentLoaded', function () {
            // Your existing JavaScript code here
            populateSections();
        });


        // Function to move a section up
        function moveSectionUp(element) {
            const sectionId = parseInt(element.getAttribute('data-section-id'));
            console.log('Moving section up with ID:', sectionId);
            console.log('Current sections:', sections); // Access the sections array

            // Find the section with the given ID
            const sectionIndex = sections.findIndex(section => section.id === sectionId);

            if (sectionIndex === -1 || sections[sectionIndex].order === 1) {
                console.log(`Section not found or already at the top: ${sectionId}`);
                return;
            }

            // Find the section with the order one less than the current section
            const aboveSection = sections.find(section => section.order === sections[sectionIndex].order - 1);

            if (!aboveSection) {
                console.log("No section found to swap with");
                return;
            }

            // Swap the order numbers
            const tempOrder = sections[sectionIndex].order;
            sections[sectionIndex].order = aboveSection.order;
            aboveSection.order = tempOrder;

            // // Update the order numbers in the backend for both sections
            // updateSectionOrder(sectionId, sections[sectionIndex].order);
            // updateSectionOrder(aboveSection.id, aboveSection.order);

            // setTimeout(function () {
            //     populateSections();
            // }, 1000);

            // Update the order numbers in the backend for both sections
            Promise.all([
                updateSectionOrder(sectionId, sections[sectionIndex].order),
                updateSectionOrder(aboveSection.id, aboveSection.order)
            ]).then(() => {
                setTimeout(function () {
                    populateSections();
                }, 150);
            }).catch(error => {
                console.error('Error updating section orders:', error);
            });

        }

        // Function to move a section down
        function moveSectionDown(element) {
            const sectionId = parseInt(element.getAttribute('data-section-id'));
            console.log('Moving section down with ID:', sectionId);
            console.log('Current sections:', sections); // Access the sections array

            // Find the section with the given ID
            const sectionIndex = sections.findIndex(section => section.id === sectionId);

            if (sectionIndex === -1 || sections[sectionIndex].order === sections.length) {
                console.log(`Section not found or already at the bottom: ${sectionId}`);
                return;
            }

            // Find the section with the order one more than the current section
            const belowSection = sections.find(section => section.order === sections[sectionIndex].order + 1);

            if (!belowSection) {
                console.log("No section found to swap with");
                return;
            }

            // Swap the order numbers
            const tempOrder = sections[sectionIndex].order;
            sections[sectionIndex].order = belowSection.order;
            belowSection.order = tempOrder;

            // Update the order numbers in the backend for both sections
            Promise.all([
                updateSectionOrder(sectionId, sections[sectionIndex].order),
                updateSectionOrder(belowSection.id, belowSection.order)
            ]).then(() => {
                setTimeout(function () {
                    populateSections();
                }, 150);
            }).catch(error => {
                console.error('Error updating section orders:', error);
            });
        }

        // Function to update the section order in the backend
        function updateSectionOrder(sectionId, newOrder) {
            console.log("Updating section order for ID:", sectionId, "to new order:", newOrder);

            // Send a request to update the section order to the server
            fetch(`/update_section_order?section_id=${sectionId}&new_order=${newOrder}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
            })
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Failed to update section order');
                    }
                    console.log('Section order updated successfully.');
                })
                .catch(error => console.error('Error:', error));
        }


        // Function to populate the sections array with data fetched from the server
        function populateSections() {
            fetch(`/get_sections_and_structure/${pageId}`) // Assuming you have a route to fetch sections along with rows and columns
                .then(response => response.json())
                .then(data => {
                    // Assuming data contains sections, rows, and columns retrieved from the server
                    const { sections, rows, columns, website } = data;

                    // Sort rows by row_number
                    rows.sort((a, b) => a.row_number - b.row_number);

                    // Once sections, rows, and columns are populated, render the HTML
                    reloadSections(sections, rows, columns, website);
                })
                .catch(error => {
                    console.error('Error fetching sections and structure:', error);
                });
        }


        function handleRowDragOver(event) {
            event.preventDefault();
            event.currentTarget.classList.add('drag-over');
            event.dataTransfer.dropEffect = 'move';
        }

        function handleRowDrop(event) {
            event.preventDefault();
            event.stopPropagation();
            event.currentTarget.classList.remove('drag-over');

            const raw = event.dataTransfer.getData("application/json");
            if (!raw) return;

            const data = JSON.parse(raw);
            if (data.type !== "section") return;

            const draggedSectionId = data.sectionId;
            const targetRowId = parseInt(event.currentTarget.dataset.rowId, 10);
            if (!targetRowId) return;

            fetch(`/insert_section_before_row/${draggedSectionId}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    targetRowId: targetRowId
                })
            })
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        console.error(data.error);
                    } else {
                        populateSections();
                    }
                })
                .catch(error => console.error(error));
        }

        function handleRowDragLeave(event) {
            event.currentTarget.classList.remove('drag-over');
        }

        function reloadSections(sections, rows, columns, website) {
            const sectionsContainer = document.getElementById('sections-container');
            sectionsContainer.innerHTML = ''; // Clear the container

            // Create a nested structure for rows and columns
            const grid = {};

            // Sort rows based on row_number
            rows.sort((a, b) => a.row_number - b.row_number);

            // Initialize the grid with rows using row.id as the key
            rows.forEach(row => {
                const rowId = row.id; // Use row.id for rowId
                grid[rowId] = {}; // Initialize the row in the grid
            });

            // Populate the grid with columns
            columns.forEach(column => {
                const matchingRow = rows.find(row => row.id === column.row_id);
                if (matchingRow) {
                    const rowId = matchingRow.id;
                    const columnNumber = column.column_number;
                    const columnId = column.column_id;
                    const columnWidth = column.width;

                    // If the column is not populated with a section, mark it as an empty column
                    if (!grid[rowId][columnNumber]) {
                        grid[rowId][columnNumber] = { isSection: false, column_id: columnId, width: columnWidth };
                    }
                } else {
                    console.warn(`No matching row found for column with row_id: ${column.row_id}`);

                            async function fetchAndStreamResponse(sectionId, prompt) {
                                const editorTextarea = sectionContent.querySelector(`#codemirror-text-${sectionId}`);
                                const currentCode = editorTextarea.value.trim(); // Get current text/code in the textarea
                                const responseContainer = sectionContent.querySelector(`#response-container-${sectionId}`);

                                        method: 'POST',
                                        headers: {
                                            'Content-Type': 'application/json',
                                        },
                                        body: JSON.stringify({ prompt: prompt, code: currentCode }),
                                    });
                                    editor.setValue('');
                                    const reader = response.body.getReader();
                                    const stream = new ReadableStream({
                                        start(controller) {
                                            function push() {
                                                reader.read().then(({ done, value }) => {
                                                    if (done) {
                                                        controller.close();
                                                        return;
                                                    }
                                                    const text = new TextDecoder().decode(value);

                                                    // Find the corresponding CodeMirror instance

                                                    if (editor) {
                                                        editor.setValue(editor.getValue() + text); // Append the response text
                                                    }

                                                    push();
                                                })
                                                    .catch(error => {
                                                        console.error(error);
                                                        controller.error(error);
                                                    });
                                            }
                                            push();
                                        }
                                    });

                                    const responseStream = new Response(stream, { headers: { 'Content-Type': 'text/plain' } });

                                    await responseStream; // Consume the response stream

                                } catch (error) {
                                    console.error('Error fetching response:', error);
                                    responseContainer.textContent = 'Error fetching response. Please try again.';
                                }
                            }

                function handleDragOver(event) {
                    event.preventDefault();

                    const targetLi = event.target.closest("li");
                    const targetList = event.currentTarget.closest("ul") || event.target.closest("ul");

                    if (!targetList || !currentDraggedLi || !currentPlaceholder) return;

                    event.dataTransfer.dropEffect = "move";

                    // If dragging over the UL but not a specific LI, append placeholder at end
                    if (!targetLi || targetLi === currentDraggedLi || targetLi === currentPlaceholder) {
                        if (!targetList.contains(currentPlaceholder)) {

                    const rect = targetLi.getBoundingClientRect();
                    const midpoint = rect.left + rect.width / 2;

                    // For horizontal thumbnail layout, compare X instead of Y
                    const insertAfter = event.clientX > midpoint;

                    if (insertAfter) {
                        targetLi.parentNode.insertBefore(currentPlaceholder, targetLi.nextSibling);

                const col1Styles = window.getComputedStyle(col1);

                const col1Padding = parseFloat(col1Styles.paddingLeft) + parseFloat(col1Styles.paddingRight);
                const col2Padding = parseFloat(col2Styles.paddingLeft) + parseFloat(col2Styles.paddingRight);

                const initialCol1Width = col1.getBoundingClientRect().width - col1Padding;

                col2PercentageIndicator.classList.add('percentage-indicator');
                col2.appendChild(col2PercentageIndicator);

                const updatePercentageIndicators = () => {
                    const newWidth1Percent = ((col1.offsetWidth / col1.parentElement.offsetWidth) * 100).toFixed(2);
                    const newWidth2Percent = ((col2.offsetWidth / col2.parentElement.offsetWidth) * 100).toFixed(2);
                    col1PercentageIndicator.textContent = `${newWidth1Percent}%`;
                    col2PercentageIndicator.textContent = `${newWidth2Percent}%`;

                    const currentX = moveEvent.clientX;
                    const dx = currentX - startX;
                    const newCol1Width = initialCol1Width + dx;
                    const newCol2Width = initialCol2Width - dx;

                    console.log("currentX:", currentX);
                    console.log("dx:", dx);
                    console.log("New col1 width:", newCol1Width);
                    console.log("New col2 width:", newCol2Width);

                    if (newCol1Width > 1 && newCol2Width > 1) {
                        col1.style.width = `${newCol1Width + col1Padding}px`;
                        col2.style.width = `${newCol2Width + col2Padding}px`;
                        updatePercentageIndicators();
                    }
                };

                const mouseUpHandler = () => {
                    resizeOverlay.style.display = 'none'; // Hide overlay after resizing
                    document.removeEventListener('mousemove', mouseMoveHandler);
                    document.removeEventListener('mouseup', mouseUpHandler);

                    col1.removeChild(col1PercentageIndicator);
                    col2.removeChild(col2PercentageIndicator);

            calendar.render();

            calendars[sectionId] = calendar;

            // Create a MutationObserver instance
            const observer = new MutationObserver((mutationsList, observer) => {
                for (const mutation of mutationsList) {
                    if (mutation.type === 'attributes' && mutation.attributeName === 'class') {
                        const classList = mutation.target.classList;
                        if (classList.contains('open')) {
                            window.dispatchEvent(new Event('resize'));
                            observer.disconnect(); // Disconnect the observer to stop observing further mutations
                        }
                    }
                }
            });

            // Start observing changes in the attributes of sectionContent
            observer.observe(sectionContent, { attributes: true });
        }

                .then(events => {

        async function saveEvent(event, sectionId) {
            const response = await fetch(`/page/${sectionId}/add_event`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(event)
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error || 'Failed to save event');
            }

            return {
                id: String(data.event.id),
                title: data.event.title,
                start: data.event.start,
                end: data.event.end,
                description: data.event.description,
                backgroundColor: data.event.backgroundColor
            };
        }

    <!-- Preview and Resizing -->
    <script>
        const previewButton = document.getElementById('previewButton');
        const rightContainer = document.getElementById('rightContainer');
        const resizer = document.getElementById('resizer');
        const leftSide = document.querySelector('.content-container');
        const overlay = document.getElementById('overlay');
        let isResizing = false;

        previewButton.addEventListener('click', () => {
            rightContainer.classList.toggle('visible');
            reloadIframe()
        });

        resizer.addEventListener('mousedown', (e) => {
            isResizing = true;
            overlay.style.display = 'block'; // Show overlay during resizing
            document.addEventListener('mousemove', resize);
            document.addEventListener('mouseup', stopResize);
            e.preventDefault(); // Prevent text selection
        });

        function resize(e) {
            if (isResizing) {
                const containerOffsetLeft = leftSide.getBoundingClientRect().left;
                const pointerRelativeXpos = e.clientX - containerOffsetLeft;
                const leftWidth = pointerRelativeXpos;
                const rightWidth = document.body.offsetWidth - leftWidth - resizer.offsetWidth;

                leftSide.style.width = `${leftWidth}px`;
                rightContainer.style.width = `${rightWidth}px`;
            }
        }

        function stopResize() {
            isResizing = false;
            overlay.style.display = 'none'; // Hide overlay after resizing
            document.removeEventListener('mousemove', resize);
            document.removeEventListener('mouseup', stopResize);
        }
    </script>

        let globalFoldersCache = [];

        async function openLibraryPicker(sectionId) {

            // Initial fetch to get the folder list
            const response = await fetch('/get_library_root');

            loadLibraryUI(null);

        async function loadLibraryUI(folderId = null) {
            // 1. Always render the FULL folder list from cache
            renderModalFolders(globalFoldersCache, folderId);

            // 2. Fetch the images for the specific folder
            const url = folderId ? `/get_library_folder/${folderId}` : '/get_library_root';
            const response = await fetch(url);
            const data = await response.json();

            // 3. Update Name
            document.getElementById('modalCurrentFolderName').innerText =
                folderId ? `Images in ${data.current_folder_name || 'Folder'}` : "Root Images";

            // 4. Render Images (Simplified to use the CSS card class)
            const imageGrid = document.getElementById('modalImageGrid');
            imageGrid.innerHTML = '';

            data.images.forEach(img => {
                const isSelected = selectedLibraryImages.includes(img.id.toString());
                const card = document.createElement('div');
                card.className = 'image-card';
                if (isSelected) card.style.border = "3px solid #f39c12";

                card.onclick = () => toggleLibrarySelection(img.id.toString(), card);
                card.innerHTML = `<img src="${img.url}">`;
                imageGrid.appendChild(card);
            });
        }

        function renderModalFolders(folders, activeId) {
            const grid = document.getElementById('modalFolderGrid');
            grid.innerHTML = '';

            // Main Library (always show)
            const rootDiv = document.createElement('div');
            rootDiv.className = `folder-item ${activeId === null ? 'active-folder' : ''}`;
            rootDiv.onclick = () => loadLibraryUI(null);
            rootDiv.innerHTML = `<i class="fas fa-home fa-3x"></i><p>Main Library</p>`;
            grid.appendChild(rootDiv);

            // Dynamic Folders (always show all)
            folders.forEach(f => {
                const folderDiv = document.createElement('div');
                folderDiv.className = `folder-item ${activeId == f.id ? 'active-folder' : ''}`;
                folderDiv.onclick = () => loadLibraryUI(f.id);
                folderDiv.innerHTML = `<i class="fas fa-folder fa-3x"></i><p>${f.name}</p>`;
                grid.appendChild(folderDiv);
            });
        }

        function toggleLibrarySelection(id, element) {
            const index = selectedLibraryImages.indexOf(id);
            if (index > -1) {
                selectedLibraryImages.splice(index, 1);
                element.style.border = "none";
            } else {
                selectedLibraryImages.push(id);
                element.style.border = "3px solid #f39c12";
            }
            document.getElementById('selectionCount').innerText = `${selectedLibraryImages.length} images selected`;
            // Re-render to show/hide checkmark badges if desired, or just use the border
        }

        function closeLibraryModal() {
            document.getElementById('libraryModal').style.display = 'none';
        }

        async function loadLibraryContent(folderId = null) {
            const url = folderId ? `/get_library_folder/${folderId}` : '/get_library_root';
            const response = await fetch(url);
            const data = await response.json();

            const imageGrid = document.getElementById('modalImageGrid');
            const folderGrid = document.getElementById('modalFolderGrid');

            imageGrid.innerHTML = '';
            // Clear and add the "Back" button if we are inside a folder
            folderGrid.innerHTML = folderId ?
                `<button onclick="loadLibraryContent()"><i class="fas fa-arrow-left"></i> Back</button>` : '';

            // Render Folders (only show if we are in the root)
            if (!folderId) {
                data.folders.forEach(f => {
                    const folderDiv = document.createElement('div');
                    folderDiv.className = 'folder-item';
                    folderDiv.onclick = () => loadLibraryContent(f.id);
                    folderDiv.innerHTML = `
                <i class="fas fa-folder fa-2x"></i>
                <p>${f.name}</p>
            `;
                    folderGrid.appendChild(folderDiv);
                });
            }

            // Render Images
            if (data.images.length === 0) {
                imageGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #999;">No images found in this section.</p>';
            } else {
                data.images.forEach(img => {
                    imageGrid.innerHTML += `

                    <img src="${img.url}" style="width:100%; height:100px; object-fit:cover; border-radius:4px; border: 2px solid transparent;">

                           onchange="toggleLibrarySelection('${img.id}', this)"

                           style="position:absolute; top:5px; right:5px; transform: scale(1.2);">
                </div>`;
                });
            }
        }



        async function confirmLibrarySelection() {
            if (selectedLibraryImages.length === 0) return;

            try {
                const response = await fetch('/add_images_from_library', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },

                    closeLibraryModal();

                }
            } catch (error) {
                console.error("Error adding images:", error);
            }
        }

    <script>

        function deleteSelectedImages(sectionId) {

        let currentDraggedLi = null;
        let currentPlaceholder = null;

        function createPlaceholder() {
            const ph = document.createElement("li");
            ph.className = "image-drop-placeholder";
            return ph;
        }

        function handleDragStart(event) {
            const li = event.target.closest("li");
            if (!li) return;

            currentDraggedLi = li;
            li.classList.add("dragging");

            event.dataTransfer.effectAllowed = "move";
            event.dataTransfer.setData("text/plain", JSON.stringify({
                sourceOrder: li.dataset.order,
                sourceSection: li.dataset.sectionId,
                sourceLinkId: li.dataset.linkId
            }));

            if (!currentPlaceholder) {
                currentPlaceholder = createPlaceholder();
            }
        }

        function handleDragEnd() {
            if (currentDraggedLi) {
                currentDraggedLi.classList.remove("dragging");
            }
            if (currentPlaceholder && currentPlaceholder.parentNode) {
                currentPlaceholder.parentNode.removeChild(currentPlaceholder);
            }
            currentDraggedLi = null;
        }

        var selectedImages = {};

        function loadUploadedImages(sectionId) {
            if (!sectionId) return;

            fetch(`/get_uploaded_images?section_id=${sectionId}`)
                .then(response => response.json())
                .then(data => {
                    const uploadedImagesUl = document.getElementById(`sortable-${sectionId}`);
                    if (!uploadedImagesUl) return;

                    uploadedImagesUl.innerHTML = "";

                    if (!selectedImages[sectionId]) {
                        selectedImages[sectionId] = [];
                    }

                    // Optional: let the UL itself accept drops
                    uploadedImagesUl.addEventListener("dragover", handleDragOver);
                    uploadedImagesUl.addEventListener("drop", handleDrop);

                    data.images.forEach(picture => {
                        const li = document.createElement("li");
                        li.setAttribute("data-link-id", picture.link_id);
                        li.setAttribute("data-order", picture.order);
                        li.setAttribute("data-id", picture.id);
                        li.setAttribute("data-section-id", sectionId);
                        li.draggable = true;

                        li.addEventListener("dragstart", handleDragStart);
                        li.addEventListener("dragover", handleDragOver);
                        li.addEventListener("drop", handleDrop);
                        li.addEventListener("dragenter", (event) => {
                            const targetLi = event.target.closest("li");
                            if (targetLi) targetLi.classList.add("drag-over");
                        });
                        li.addEventListener("dragleave", (event) => {
                            const targetLi = event.target.closest("li");
                            if (targetLi) targetLi.classList.remove("drag-over");
                        });
                        li.addEventListener("dragend", handleDragEnd);

                        const img = document.createElement("img");
                        img.src = picture.url;
                        img.draggable = false; // important

                        const checkbox = document.createElement("input");
                        checkbox.type = "checkbox";
                        checkbox.className = "image-checkbox";
                        checkbox.addEventListener("change", function () {
                            if (this.checked) {
                                addToSelectedImages(sectionId, picture.link_id);
                            } else {
                                removeFromSelectedImages(sectionId, picture.link_id);
                            }
                        });

                        li.appendChild(img);
                        li.appendChild(checkbox);
                        uploadedImagesUl.appendChild(li);
                    });
                })
                .catch(error => console.error("Error:", error));
        }

        // Function to add image to the list of selected images for a specific section
        function addToSelectedImages(sectionId, imageId) {
            // Add image ID to the selected images list for this section
            selectedImages[sectionId].push(imageId);
            console.log('Image added to selected list for section', sectionId, ':', imageId);
        }

        // Function to remove image from the list of selected images for a specific section
        function removeFromSelectedImages(sectionId, imageId) {
            // Remove image ID from the selected images list for this section
            var index = selectedImages[sectionId].indexOf(imageId);
            if (index !== -1) {
                selectedImages[sectionId].splice(index, 1);
            }
            console.log('Image removed from selected list for section', sectionId, ':', imageId);
        }


        // let dropHandled = false;

        function handleDrop(event) {
            event.preventDefault();

            if (!currentDraggedLi || !currentPlaceholder) return;

            const sourceData = JSON.parse(event.dataTransfer.getData("text/plain"));
            const sourceSection = sourceData.sourceSection;
            const sourceLinkId = sourceData.sourceLinkId;

            const targetList = currentPlaceholder.closest("ul");
            if (!targetList) return;

            const targetSection = targetList.id.replace("sortable-", "");

            if (sourceSection !== targetSection) {
                moveImageToSection(sourceLinkId, sourceSection, targetSection);
                handleDragEnd();
                return;
            }

            targetList.insertBefore(currentDraggedLi, currentPlaceholder);
            currentPlaceholder.remove();

            const orderData = Array.from(targetList.querySelectorAll("li:not(.image-drop-placeholder)")).map((li, index) => ({
                link_id: parseInt(li.dataset.linkId, 10),
                order: index + 1,
                sectionId: parseInt(targetSection, 10)
            }));

            updateImageOrder(orderData);
            handleDragEnd();
        }

        function reorderImagesByDropPosition(sourceLinkId, targetLi, sectionId, event) {
            const sortableContainer = document.getElementById(`sortable-${sectionId}`);
            if (!sortableContainer) return;

            const fromLi = sortableContainer.querySelector(`li[data-link-id="${sourceLinkId}"]`);
            if (!fromLi || !targetLi || fromLi === targetLi) return;

            const rect = targetLi.getBoundingClientRect();
            const midpoint = rect.top + rect.height / 2;
            const dropAfter = event.clientY > midpoint;

            if (dropAfter) {
                sortableContainer.insertBefore(fromLi, targetLi.nextSibling);
            } else {
                sortableContainer.insertBefore(fromLi, targetLi);
            }

            const orderData = Array.from(sortableContainer.children).map((li, index) => ({
                link_id: parseInt(li.dataset.linkId, 10),
                order: index + 1,
                sectionId: parseInt(sectionId, 10)
            }));

            updateImageOrder(orderData);
        }

        function handleDragOver(event) {
            event.preventDefault();

            const targetLi = event.target.closest("li");
            const targetList = event.currentTarget.closest("ul") || event.target.closest("ul");

            if (!targetList || !currentDraggedLi || !currentPlaceholder) return;

            event.dataTransfer.dropEffect = "move";

            // If dragging over the UL but not a specific LI, append placeholder at end
            if (!targetLi || targetLi === currentDraggedLi || targetLi === currentPlaceholder) {
                if (!targetList.contains(currentPlaceholder)) {
                    targetList.appendChild(currentPlaceholder);
                }
                return;
            }

            const rect = targetLi.getBoundingClientRect();
            const midpoint = rect.left + rect.width / 2;

            // For horizontal thumbnail layout, compare X instead of Y
            const insertAfter = event.clientX > midpoint;

            if (insertAfter) {
                targetLi.parentNode.insertBefore(currentPlaceholder, targetLi.nextSibling);
            } else {
                targetLi.parentNode.insertBefore(currentPlaceholder, targetLi);
            }
        }

        window.addEventListener("load", function () {

        // Function to add a slideshow image
        function addSlideshowImage(imageId, imageUrl, sectionId) {
            var formData = new FormData(document.getElementById("updateImageForm"));
            formData.append('section_id', sectionId); // Append sectionId to form data

            fetch("/update_public_images", {
                method: "POST",
                body: formData
            })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        // Add the slideshow image with the image ID and URL
                        var slideshowUl = document.getElementById("slideshowSortable");
                        var li = document.createElement("li");
                        var img = document.createElement("img");
                        li.draggable = true;
                        li.addEventListener("dragstart", handleDragStartSlideshow);
                        li.addEventListener("dragover", handleDragOver);
                        li.addEventListener("drop", handleDropSlideshow);
                        img.src = imageUrl;
                        li.appendChild(img);
                        li.setAttribute("data-id", imageId); // Set data-id attribute for image ID
                        slideshowUl.appendChild(li);
                        document.getElementById("message").innerHTML = "Image added to slideshow.";
                    } else {
                        document.getElementById("message").innerHTML = "Failed to add image to slideshow.";
                    }
                })
                .catch(error => console.error('Error:', error));
        }



        function handleDropSlideshow(event) {
            event.preventDefault();

            // Get the dragged index
            var draggedIndex = event.dataTransfer.getData("text/plain");

            // Check if the drop event originates from the uploaded images area
            var isFromUploaded = event.dataTransfer.getData("isFromUploaded") === "true";

            // If the drop event originates from the uploaded images area, do nothing
            if (isFromUploaded) {
                console.log("Image dragged from uploaded images, ignoring drop in slideshow.");
                return;
            }

            // Get the image ID of the dragged image
            var imageId = document.querySelector(`#sortable li[data-index="${draggedIndex}"]`).getAttribute("data-id");
            var sectionId = document.querySelector(`#sortable li[data-index="${draggedIndex}"]`).getAttribute("data-section-id");

            // Check if the dropped image is not already in the slideshow
            var slideshowImages = document.getElementById("slideshowSortable").querySelectorAll("li");
            var isAlreadyInSlideshow = Array.from(slideshowImages).some(li => li.dataset.id === imageId);

            if (!isAlreadyInSlideshow) {
                // Get the image URL from the uploaded images section
                var imageUrl;
                var uploadedImages = document.getElementById("sortable").querySelectorAll("li");
                uploadedImages.forEach(li => {
                    if (li.dataset.index === draggedIndex) {
                        imageUrl = li.querySelector("img").src;
                    }
                });

                // Add the slideshow image with the image ID and URL
                addSlideshowImage(imageId, imageUrl, sectionId);
            } else {
                console.log("Image already exists in the slideshow.");
            }
        }

        // Function to update the order of images on the server
        function updateImageOrder(order) {
            // Extract the sectionId from the first item in the order array
            // so we know which specific section to reload later.
            const sectionId = order.length > 0 ? order[0].sectionId : null;

            fetch("/update_image_order", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(order)
            })
                .then(response => response.json())
                .then(data => {
                    if (data.status !== 'success') {
                        // Check if showMessage exists, otherwise use alert or console
                        if (typeof showMessage === "function") {
                            showMessage(data.message);
                        } else {
                            console.error(data.message);
                        }
                    } else {
                        // CRITICAL: Reload ONLY the section that was changed
                        if (sectionId) {
                            loadUploadedImages(sectionId);
                        } else {
                            // Fallback if no ID was found
                            console.log("Order updated, but no sectionId found to reload.");
                        }
                    }
                })
                .catch(error => console.error('Error:', error));
        }

        function moveImageToSection(sourceLinkId, sourceSection, targetSection) {
            fetch("/move_image_to_section", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    sourceLinkId: sourceLinkId,
                    sourceSection: sourceSection,
                    targetSection: targetSection
                })
            })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        loadUploadedImages(sourceSection);
                        loadUploadedImages(targetSection);
                    } else {
                        console.error("Failed to move image:", data.message);
                    }
                })
                .catch(error => console.error('Error:', error));
        }

        function updateUIAfterMove(sourceOrder, sourceSection, targetSection) {
            // Remove the image from the source section
            var sourceSectionContainer = document.getElementById(`sortable-${sourceSection}`);
            var sourceImage = sourceSectionContainer.querySelector(`li[data-order="${sourceOrder}"]`);
            sourceImage.remove();

            // Reload images for the source section
            loadUploadedImages(sourceSection);

            // Reload images for the target section
            loadUploadedImages(targetSection);
        }

        function swapImages(fromLinkId, toLinkId, sectionId) {
            const sortableContainer = document.getElementById(`sortable-${sectionId}`);
            if (!sortableContainer) return;

            const fromLi = sortableContainer.querySelector(`li[data-link-id="${fromLinkId}"]`);
            const toLi = sortableContainer.querySelector(`li[data-link-id="${toLinkId}"]`);

            if (!fromLi || !toLi || fromLi === toLi) return;

            const children = Array.from(sortableContainer.children);
            const fromIndex = children.indexOf(fromLi);
            const toIndex = children.indexOf(toLi);

            if (fromIndex < toIndex) {
                sortableContainer.insertBefore(fromLi, toLi.nextSibling);
            } else {
                sortableContainer.insertBefore(fromLi, toLi);
            }

            const orderData = Array.from(sortableContainer.children).map((li, index) => ({
                link_id: parseInt(li.dataset.linkId, 10),
                order: index + 1,
                sectionId: parseInt(sectionId, 10)
            }));

            updateImageOrder(orderData);
        }


        // Function to handle deletion of images using the trash can
        function handleDropTrash(event, source) {
            event.preventDefault();
            var order = event.dataTransfer.getData("text/plain");
            var imageToRemove = document.querySelector(`li[data-order="${order}"]`);
            if (imageToRemove) {
                // Display a confirmation dialog before deleting the image
                var confirmation = confirm("Are you sure you want to delete this image?");
                if (confirmation) {
                    // If the user confirms, proceed with deletion
                    var imageId = imageToRemove.dataset.id;
                    deleteImage(imageId); // Call the function to delete the image
                    imageToRemove.remove();
                }
            }
        }

        function deleteImage(imageId) {
            fetch("/delete_image", {

                headers: {

                },
                body: JSON.stringify({ id: imageId })

                    } else {

                        showMessage(data.message);
                    }
                })
                .catch(error => console.error('Error:', error));
        }

    <script>
        function showMessage(message) {
            var messageElement = document.getElementById('message');
            var messageContent = document.getElementById('messageContent');

            // Set message content
            messageContent.textContent = message;

            // Show the message
            messageElement.style.display = 'block';
        }

        function closeMessage() {
            var messageElement = document.getElementById('message');

            // Hide the message
            messageElement.style.display = 'none';
        }

        function initializeCodeMirror(textArea) {
            const editor = CodeMirror.fromTextArea(textArea, {
                mode: "htmlmixed",
                lineNumbers: true,
                theme: "dracula",
                autoCloseBrackets: true,
                lineWrapping: false,
                gutters: ["CodeMirror-lint-markers"],
                lint: {
                    getAnnotations: function (content) {
                        var result = []; // Initialize an empty array to store linting results

                        // Check for unclosed HTML tags
                        var tagRegex = /<([^\/!][^\s>]*)\b[^>]*>(?![\s\S]*?<\/\1>)/g;
                        var match;
                        while ((match = tagRegex.exec(content)) !== null) {
                            result.push({
                                message: "Unclosed tag: <" + match[1] + ">",
                                severity: "error",
                                from: CodeMirror.Pos(content.substr(0, match.index).split('\n').length - 1, match.index - content.lastIndexOf('\n', match.index - 1) - 1),
                                to: CodeMirror.Pos(content.substr(0, match.index).split('\n').length - 1, match.index - content.lastIndexOf('\n', match.index - 1))
                            });
                        }

                        // Check for unclosed curly braces
                        var braceStack = [];
                        for (var i = 0; i < content.length; i++) {
                            if (content[i] === '{') {
                                braceStack.push(i);
                            } else if (content[i] === '}') {
                                if (braceStack.length > 0) {
                                    braceStack.pop();
                                } else {
                                    result.push({
                                        message: "Unmatched closing brace: }",
                                        severity: "error",
                                        from: CodeMirror.Pos(content.substr(0, i).split('\n').length - 1, i - content.lastIndexOf('\n', i - 1) - 1),
                                        to: CodeMirror.Pos(content.substr(0, i).split('\n').length - 1, i - content.lastIndexOf('\n', i - 1))
                                    });
                                }
                            }
                        }

                        while (braceStack.length > 0) {
                            var unmatchedIndex = braceStack.pop();
                            result.push({
                                message: "Unclosed brace: {",
                                severity: "error",
                                from: CodeMirror.Pos(content.substr(0, unmatchedIndex).split('\n').length - 1, unmatchedIndex - content.lastIndexOf('\n', unmatchedIndex - 1) - 1),
                                to: CodeMirror.Pos(content.substr(0, unmatchedIndex).split('\n').length - 1, unmatchedIndex - content.lastIndexOf('\n', unmatchedIndex - 1))
                            });
                        }

                        // Check for unclosed parentheses
                        var parenStack = [];
                        for (var i = 0; i < content.length; i++) {
                            if (content[i] === '(') {
                                parenStack.push(i);
                            } else if (content[i] === ')') {
                                if (parenStack.length > 0) {
                                    parenStack.pop();
                                } else {
                                    result.push({
                                        message: "Unmatched closing parenthesis: )",
                                        severity: "error",
                                        from: CodeMirror.Pos(content.substr(0, i).split('\n').length - 1, i - content.lastIndexOf('\n', i - 1) - 1),
                                        to: CodeMirror.Pos(content.substr(0, i).split('\n').length - 1, i - content.lastIndexOf('\n', i - 1))
                                    });
                                }
                            }
                        }

                        while (parenStack.length > 0) {
                            var unmatchedIndex = parenStack.pop();
                            result.push({
                                message: "Unclosed parenthesis: (",
                                severity: "error",
                                from: CodeMirror.Pos(content.substr(0, unmatchedIndex).split('\n').length - 1, unmatchedIndex - content.lastIndexOf('\n', unmatchedIndex - 1) - 1),
                                to: CodeMirror.Pos(content.substr(0, unmatchedIndex).split('\n').length - 1, unmatchedIndex - content.lastIndexOf('\n', unmatchedIndex - 1))
                            });
                        }
                        // Check for missing semicolons only in JavaScript and CSS
                        var lines = content.split('\n');
                        for (var i = 0; i < lines.length; i++) {
                            var line = lines[i].trim();
                            if (!line.includes('<') && !line.includes('>')) { // Exclude lines containing < and >
                                // Check if the line is a continuation of an expression or a template literal
                                if (line && !line.endsWith(';') && !line.endsWith('}') && !line.endsWith('{') && !line.endsWith(')') && !line.endsWith(',') && !/[\+\-\*\/=]$/.test(line) && !/\$\{[^}]+\}$/.test(line)) {
                                    result.push({
                                        message: "Missing semicolon or incorrect line termination",
                                        severity: "error",
                                        from: CodeMirror.Pos(i, 0),
                                        to: CodeMirror.Pos(i, lines[i].length)
                                    });
                                }
                            }
                        }

                        return result;
                    }
                }
            });
            codeMirrorEditors.push(editor);

            // Attach format code button to this specific CodeMirror instance
            const formatCodeButton = textArea.closest('.page-body-container').querySelector('.formatCodeButton');
            formatCodeButton.addEventListener('click', function () {
                formatCode(editor);
            });
            return editor;
        }
        const codeMirrorEditors = [];

        function formatCode(editor) {
            if (editor) {
                var content = editor.getValue();
                var mode = editor.getOption("mode");
                var formattedContent;

                if (mode === "htmlmixed") {
                    formattedContent = html_beautify(content, {
                        indent_size: 4,
                        indent_char: ' ',
                        max_preserve_newlines: 1,
                        preserve_newlines: true,
                        indent_inner_html: true,

                } else {

                        max_preserve_newlines: 1,
                        preserve_newlines: true,
                        brace_style: "collapse",
                        wrap_line_length: 80,
                        end_with_newline: true
                    });
                }

                editor.setValue(formattedContent);
            }
        }

    <script>
        const savedBackground = {{ page_content.background_color| tojson }};
        const savedTextColor = {{ page_content.text_color| tojson }};

        const gradientContainer = document.getElementById('gradient-colors');
        const addColorBtn = document.getElementById('add-color-stop');
        const directionSelect = document.getElementById('gradient-direction');
        const textColorPicker = document.getElementById('text-color');

        let timer = null;

        function debounceUpdate() {
            clearTimeout(timer);
            timer = setTimeout(updatePageColors, 500);
        }

        function createColorInput(value = '#ffffff') {
            const wrapper = document.createElement('div');
            wrapper.className = 'gradient-stop';

            const input = document.createElement('input');
            input.type = 'color';
            input.className = 'gradient-color';
            input.value = value;

            const removeBtn = document.createElement('button');
            removeBtn.type = 'button';
            removeBtn.textContent = '×';

            removeBtn.addEventListener('click', () => {
                const allStops = gradientContainer.querySelectorAll('.gradient-stop');
                if (allStops.length > 1) {
                    wrapper.remove();
                    debounceUpdate();
                }
            });

            input.addEventListener('input', debounceUpdate);

            wrapper.appendChild(input);
            wrapper.appendChild(removeBtn);
            gradientContainer.appendChild(wrapper);
        }

        function parseSavedBackground(backgroundValue) {
            if (!backgroundValue) {
                return {
                    direction: 'to right',
                    colors: ['#ffffff', '#000000']
                };
            }

            const trimmed = backgroundValue.trim();

            if (!trimmed.startsWith('linear-gradient(')) {
                return {
                    direction: 'to right',
                    colors: [trimmed]
                };
            }

            const inside = trimmed.slice('linear-gradient('.length, -1);
            const parts = inside.split(',').map(p => p.trim());

            let direction = 'to right';
            let colors = parts;

            if (
                parts[0].startsWith('to ') ||
                parts[0].includes('deg')
            ) {
                direction = parts[0];
                colors = parts.slice(1);
            }

            return {
                direction,
                colors
            };
        }

        function initializeBackgroundControls() {
            gradientContainer.innerHTML = '';

            const parsed = parseSavedBackground(savedBackground);

            if ([...directionSelect.options].some(opt => opt.value === parsed.direction)) {
                directionSelect.value = parsed.direction;
            } else {
                directionSelect.value = 'to right';
            }

            parsed.colors.forEach(color => {
                createColorInput(color);
            });

            if (parsed.colors.length === 0) {
                createColorInput('#ffffff');
                createColorInput('#000000');
            }

            textColorPicker.value = savedTextColor || '#000000';
        }

        addColorBtn.addEventListener('click', () => {
            createColorInput('#ffffff');
            debounceUpdate();
        });

        directionSelect.addEventListener('change', debounceUpdate);
        textColorPicker.addEventListener('input', debounceUpdate);

        function updatePageColors() {
            const pageId = "{{ page_content.id }}";
            const colors = Array.from(document.querySelectorAll('.gradient-color')).map(input => input.value);
            const text_color = textColorPicker.value;

            let background_color = colors[0] || '#ffffff';

            if (colors.length > 1) {
                background_color = `linear-gradient(${directionSelect.value}, ${colors.join(', ')})`;
            }

            fetch(`/update_page_colors/${pageId}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ background_color, text_color })
            })
                .then(response => response.json())
                .then(data => {
                    console.log('Colors updated:', data.message);
                    reloadIframe();
                })
                .catch(error => {
                    console.error('Error updating colors:', error);
                });
        }

        document.addEventListener('DOMContentLoaded', initializeBackgroundControls);
    </script>

    {% endblock %}
</body>

</html>
