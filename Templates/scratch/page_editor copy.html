<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0">
    <title>Web Builder</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/dracula.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/lint/lint.min.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/themes/classic.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">


    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/mode/css/css.min.js"></script>

</head>



<style>
    body {
        font-family: 'Roboto', sans-serif;
        display: flex;
        flex-direction: column;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        overflow: hidden;
        background-color: #363339;
        color: #ffffff;
        /* Prevent body from scrolling */
    }

    .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px;
        background-color: #3b373b;
        color: white;
        height: 2vw;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);

    }


    .add-section-btn {
        float: right;
        font-size: 18px;
        color: white;
        padding: 14px 16px;
        cursor: pointer;
        background-color: transparent;
    }

    .modal {
        display: none;
        position: fixed;
        z-index: 1;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        overflow: auto;
        background-color: rgb(0, 0, 0);
        background-color: rgba(0, 0, 0, 0.4);
        padding-top: 60px;
    }

    .modal-content {
        background-color: #fefefe;
        margin: 5% auto;
        padding: 20px;
        border: 1px solid #888;
        width: 80%;
    }

    .close {
        color: #aaa;
        float: right;
        font-size: 28px;
        font-weight: bold;
    }

    .close:hover,
    .close:focus {
        color: black;
        text-decoration: none;
        cursor: pointer;
    }

    /* Style the button */
    #previewButton {
        background-color: transparent;
        color: white;
        border: none;
        padding: 10px 20px;
        cursor: pointer;
        border-radius: 5px;
        transition: background-color 0.3s;
    }

    #previewButton:hover,
    #refreshButton:hover,
    #saveChangesButton:hover,
    #addSectionBtn:hover {
        background-color: #45a049;
        cursor: pointer;
    }

    /* Style the icon */
    #previewButton i {
        margin-right: 5px;
    }

    #refreshButton {
        background-color: transparent;
        border: none;
        cursor: pointer;
        margin-left: 10px;
        color: #ffffff;
        /* Adjust margin as needed */
    }

    #refreshButton i {
        font-size: 20px;

        /* Adjust icon size as needed */
    }

    .big-content-container {
        display: flex;
        flex-direction: column;
        /* Change to column layout for mobile */
        height: calc(100vh - 50px);
        /* Adjust for navbar height */
        max-width: 100vw;
        /* Set max width to fill the screen */
    }

    @media (min-width: 769px) {

        /* Apply desktop layout styles */
        .big-content-container {
            flex-direction: row;
            /* Change to row layout for desktop */
        }
    }


    .content-container {
        flex: 1;
        padding: 0 10px;
        height: 100%;
        overflow-y: auto;
        position: relative;
    }

    .web-preview {
        width: 50%;
        /* Set initial width */
        height: 100%;
        position: relative;
        overflow: hidden;
    }

    #publicFrame {
        width: 100%;
        height: 100%;
        border: none;
    }

    .resizer {
        width: 10px;
        background: #252525;
        cursor: ew-resize;
        border-left: 2px solid #646464;
        /* Left border */
        border-right: 2px solid #646464;
        /* Right border */

    }

    .overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.5);
        display: none;
        z-index: 2;
    }

    @media (max-width: 768px) {
        .resizer {
            display: none;
        }

        .web-preview {
            display: none;
            width: 100%;
        }

        .web-preview.visible {
            display: block;
        }
    }

    h2 {
        margin-bottom: 10px;
        text-align: center;
    }

    form {
        margin-bottom: 10px;
    }

    label {
        display: block;
        margin-bottom: 5px;
    }

    input[type="file"],
    textarea {
        width: 100%;
        margin-bottom: 10px;
    }

    input[type="submit"] {
        padding: 10px 20px;
        background-color: #4CAF50;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    input[type="checkbox"] {
        margin-right: 10px;
    }

    #message {
        position: fixed;
        bottom: 10px;
        /* Adjust as needed */
        left: 50%;
        /* Position horizontally in the middle */
        transform: translateX(-50%);
        /* Center horizontally */
        padding: 10px;
        background-color: #f0f0f0;
        border-radius: 5px;
        display: none;
        /* Initially hide the message */
    }

    #closeButton {
        position: absolute;
        top: 5px;
        right: 5px;
        cursor: pointer;
    }



    .uploaded-images {
        margin-top: 5px;
        list-style-type: none;
        padding: 0;
    }

    .uploaded-images li {
        padding: 3px;
        /* background-color: #f9f9f900; */
        border: 1px solid #ddd;
        cursor: move;
        z-index: 100;
        display: inline-block;
        position: relative;
        border-radius: 5px
    }

    .uploaded-images img {
        max-width: 150px;
        max-height: 120px;
        display: block;
        margin: 0 auto;
        position: relative;
        z-index: -1;
        border: 1px solid #ddd;
        pointer-events: none;
    }

    .uploaded-images .drag-over {
        border: 2px dashed #2dce35;
    }

    #trashCan {
        display: inline-block;
        width: 100px;
        height: 75px;
    }

    #trashCan .drag-over {
        border: 2px dashed #ce682d;
        /* Add dashed border when dragging over */
    }

    ul {
        display: block;
        list-style-type: disc;
        margin-block-start: 1em;
        margin-block-end: 1em;
        margin-inline-start: 0px;
        margin-inline-end: 0px;
        padding-inline-start: 0px;
    }

    label {
        /* margin-top: 10px; */
        font-weight: bold;
    }

    .uploaded-images-container,
    .toggle-page-container,
    .message,
    .page-header-container,
    .update-text-container,
    .page-body-container,
    .map-marker-container,
    .contact-form-container,
    .section-container {
        width: 90%;
        margin: 0 auto;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 5px;
        background-color: #32343b;
        margin-bottom: 20px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
    }

    .section-title {
        width: 90%;
        margin: 0 auto;
        padding: 12px;
        border: 3px solid #ccc;
        border-radius: 5px;
        margin-top: 20px;
        box-shadow: 0 8px 10px rgba(0, 0, 0, 0.3);
        cursor: pointer;
        transition: background-color 0.3s ease;
        font-weight: bold;
        border-style: groove;
        border-color: #84a79d91;
    }

    .section-title:hover {
        background-color: #68596b;
        /* Change background color on hover */
    }

    .section-content {
        display: none;
        /* Hide the section content by default */
        overflow: hidden;
        /* Hide any overflow content */
        transition: height 0.3s ease;
        /* Add a smooth transition for height change */
    }

    .section-content.open {
        display: block;
        /* Show the section content when open */
        height: auto;
        /* Automatically adjust height */
    }


    label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
    }

    .dynamic-width {
        width: calc(100% - 24px);
        /* Adjust the width based on the padding */
    }

    .editor-wrapper {
        position: relative;
        width: 100%;
        height: 600px;
        /* Initial height */
        resize: vertical;
        overflow: hidden;
        border: 1px solid #ccc;
    }

    .CodeMirror {
        width: 100%;
        height: 100%;
    }

    .color-picker-container {
        display: inline-block;
        position: relative;
        padding: 5px 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        cursor: pointer;
    }

    .color-picker-container:hover {
        background-color: #f0f0f0;
    }
</style>

<style>
    /* Dark mode styles
    body.dark-mode {
        background-color: #363339;
        color: #ffffff;
    }

    .navbar.dark-mode {
        background-color: #3b373b;
    }

    .dropbtn.dark-mode {

        color: white;
    } */

    /* input[type="submit"].dark-mode,
    #previewButton.dark-mode,
    #refreshButton {
        color: #ffffff;
    } */

    .toggle-switch {
        display: flex;
        align-items: center;
        gap: 5px;
    }

    .toggle-switch input[type="checkbox"] {
        display: none;
    }

    .toggle-switch label {
        position: relative;
        display: inline-block;
        width: 40px;
        height: 20px;
        background-color: #ccc;
        border-radius: 20px;
        cursor: pointer;
    }

    .toggle-switch label::after {
        content: '';
        position: absolute;
        width: 18px;
        height: 18px;
        background-color: #ffffff;
        border-radius: 50%;
        top: 1px;
        left: 1px;
        transition: all 0.3s;
    }

    .toggle-switch input[type="checkbox"]:checked+label::after {
        transform: translateX(20px);
    }

    .toggle-switch input[type="checkbox"]:checked+label {
        background-color: #4CAF50;
    }

    /* WebKit-based browsers */
    ::-webkit-scrollbar {
        width: 12px;
        /* Width of the scrollbar */
        height: 12px;
        /* Height of the scrollbar */
    }

    ::-webkit-scrollbar-track {
        background: #333;
        /* Dark background for the scrollbar track */
    }

    ::-webkit-scrollbar-thumb {
        background-color: #555;
        /* Darker color for the scrollbar thumb */
        border-radius: 10px;
        /* Rounded corners for the scrollbar thumb */
        border: 3px solid #333;
        /* Adds space around the thumb and makes it look better */
    }

    ::-webkit-scrollbar-thumb:hover {
        background: #777;
        /* Lighter color when hovering over the scrollbar thumb */
    }

    /* Firefox */
    * {
        scrollbar-width: thin;
        /* Thin scrollbar width */
        scrollbar-color: #555 #333;
        /* Thumb color and track color */
    }

    /* Scrollbar for specific elements */
    .scrollable-element {
        scrollbar-width: thin;
        /* Thin scrollbar width */
        scrollbar-color: #555 #333;
        /* Thumb color and track color */
    }

    /* Styling the scrollbar for specific elements in WebKit-based browsers */
    .scrollable-element::-webkit-scrollbar {
        width: 12px;
        /* Width of the scrollbar */
        height: 12px;
        /* Height of the scrollbar */
    }

    .scrollable-element::-webkit-scrollbar-track {
        background: #333;
        /* Dark background for the scrollbar track */
    }

    .scrollable-element::-webkit-scrollbar-thumb {
        background-color: #555;
        /* Darker color for the scrollbar thumb */
        border-radius: 10px;
        /* Rounded corners for the scrollbar thumb */
        border: 3px solid #333;
        /* Adds space around the thumb and makes it look better */
    }

    .scrollable-element::-webkit-scrollbar-thumb:hover {
        background: #777;
        /* Lighter color when hovering over the scrollbar thumb */
    }
</style>

<style>
    .dropdown {
        display: relative;
        font-size: small;
    }

    .dropbtn {
        background-color: transparent;
        border: none;
        cursor: pointer;
        color: rgb(126, 226, 204);
        font-weight: bolder;
        font-size: 18px;
    }

    .dropdown-content {
        display: none;
        position: absolute;
        background-color: #3d3d3d;
        box-shadow: 0px 8px 16px 0px rgba(0, 0, 0, 0.2);
        z-index: 1;
        right: 0;
        /* Adjust to move content to the left */
    }


    .dropdown:hover .dropdown-content {
        display: block;
    }

    .dropdown-content a {
        color: rgb(226, 226, 226);
        padding: 12px 16px;
        text-decoration: none;
        display: block;
    }

    .dropdown-content a:hover {
        background-color: #616963;
    }

    /* CSS for the checkbox */
    .image-checkbox {
        position: absolute;
        top: 5px;
        /* Adjust as needed */
        right: 5px;
        /* Adjust as needed */
        z-index: 1;
        /* Ensure the checkbox is above the image */
    }

    /* CSS to style the checkbox when checked */
    .image-checkbox:checked+img {
        border: 2px solid #73ff00;
        /* Change the border color as needed */
    }

    .arrow {
        position: static;
        cursor: pointer;
        z-index: 9999;
        transition: all 0.3s ease;
        border-style: inset;
        border-radius: 5px;
        padding: 1px;
        font-size: 18px;
        margin-right: 8px;
        border-color: #86b3a6;
    }

    .arrow:hover {
        color: rgb(0, 255, 179);
        /* Change color on hover */
    }

    .publish_page {
        display: flex;
        align-items: center;
    }

    .switch-label {
        display: flex;
        align-items: center;
        cursor: pointer;
        font-size: 12px;
        /* Smaller font size */
    }

    .switch-label input[type="checkbox"] {
        display: none;
    }

    .switch-label .slider {
        position: relative;
        width: 34px;
        /* Smaller width */
        height: 18px;
        /* Smaller height */
        background-color: #ccc;
        border-radius: 18px;
        /* Match height for perfect circle ends */
        margin-left: 8px;
        /* Adjust margin for spacing */
        transition: background-color 0.2s;
    }

    .switch-label .slider::before {
        content: "";
        position: absolute;
        width: 16px;
        /* Smaller handle size */
        height: 16px;
        background-color: white;
        border-radius: 50%;
        top: 1px;
        left: 1px;
        transition: transform 0.2s;
    }

    .switch-label input[type="checkbox"]:checked+.slider {
        background-color: #4caf50;
    }

    .switch-label input[type="checkbox"]:checked+.slider::before {
        transform: translateX(16px);
        /* Adjust translation for smaller switch */
    }
</style>
<style>
    .calendar-container {

    }

    .add-event-button {
        position: absolute;

        border: none;

    .add-event-button:hover {

    }

    .fc-direction-ltr {
        direction: ltr;
        text-align: left;
        height: 425px;
    }

    .popup-form label {

    .popup-form input[type="text"],

        margin-right: 15px;
        border: none;
        border-radius: 5px;

    }

    input[type="file"],

        width: 100%;
        margin-bottom: 10px;
        border-radius: 5px;

    }

    .popup-form input[type="submit"] {
        background-color: #81599f;

    }

    .popup-form input[type="submit"]:hover {

</style>
<style>

    .form-row label {

<body>

    <!-- Include CodeMirror and Linting Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/edit/matchbrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/edit/closebrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jshint/2.13.4/jshint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/lint/lint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/lint/javascript-lint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/lint/html-lint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/htmlhint/0.11.0/htmlhint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/csslint/1.0.5/csslint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/lint/css-lint.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/pickr.min.js"></script>


    <div class="navbar">
        <div class="navbar-title">uwebia</div>


        <span class="add-section-btn" id="addSectionBtn">+</span>


        <button id="saveChangesButton"><i class="fas fa-save"></i></button>

        <button id="previewButton">
            <i class="fas fa-eye"></i>
        </button>
        <button id="refreshButton">
            <i class="fas fa-sync"></i>
        </button>
        <!-- <label class="switch">
            <input type="checkbox" id="darkModeToggle" checked>
            <span class="slider round"></span>
        </label> -->
        <div class="publish_page">
            <label class="switch-label">
                Publish
                <input type="checkbox" id="toggle" data-website-id="{{ website.id }}" {% if site_active_status
                    %}checked{% endif %}>
                <span class="slider"></span>
            </label>
        </div>

    </div>


    <div class="big-content-container">
        <div class="content-container">
            <h2>Admin Page</h2>
            <a href="{{ url_for('public_page', website_id=website.id) }}" class="public-page-button"
                style="color:#a7eaf3">View Public Page</a>



            <!-- HTML Structure -->
            <div id="sections-container" class="sections-container">
                {% for row in range(max_rows) %}
                <div class="row" data-row="{{ row }}">
                    {% for column in range(max_columns) %}
                    <div class="column" data-row="{{ row }}" data-column="{{ column }}">
                        <!-- Sections will be dynamically loaded here -->
                    </div>
                    {% endfor %}
                </div>
                {% endfor %}
            </div>

            <div id="message">
                <span id="messageContent"></span>
                <span id="closeButton" onclick="closeMessage()">x</span>
            </div>
        </div>
        <div class="resizer" id="resizer"></div>
        <!-- Iframe of public page -->
        <div class="web-preview" id="rightContainer">
            <iframe id="publicFrame" src="" data-website-id="{{ website.id }}" data-page-id="{{ page_id }}"></iframe>
            <div class="overlay" id="overlay"></div>
        </div>

        <div id="add-section-modal" class="modal">
            <div class="modal-content">

        // Function to move a section up
        function moveSectionUp(element) {
            const sectionId = parseInt(element.getAttribute('data-section-id'));
            console.log('Moving section up with ID:', sectionId);
            console.log('Current sections:', sections); // Access the sections array

            // Find the section with the given ID
            const sectionIndex = sections.findIndex(section => section.id === sectionId);

            if (sectionIndex === -1 || sections[sectionIndex].order === 1) {
                console.log(`Section not found or already at the top: ${sectionId}`);
                return;
            }

            // Find the section with the order one less than the current section
            const aboveSection = sections.find(section => section.order === sections[sectionIndex].order - 1);

            if (!aboveSection) {
                console.log("No section found to swap with");
                return;
            }

            // Swap the order numbers
            const tempOrder = sections[sectionIndex].order;
            sections[sectionIndex].order = aboveSection.order;
            aboveSection.order = tempOrder;

            // // Update the order numbers in the backend for both sections
            // updateSectionOrder(sectionId, sections[sectionIndex].order);

            // setTimeout(function () {

            // Update the order numbers in the backend for both sections
            Promise.all([
                updateSectionOrder(sectionId, sections[sectionIndex].order),
                updateSectionOrder(aboveSection.id, aboveSection.order)
            ]).then(() => {
                setTimeout(function () {
                    populateSections();

                console.error('Error updating section orders:', error);

            // Find the section with the given ID
            const sectionIndex = sections.findIndex(section => section.id === sectionId);

            if (sectionIndex === -1 || sections[sectionIndex].order === sections.length) {
                console.log(`Section not found or already at the bottom: ${sectionId}`);
                return;
            }

            // Find the section with the order one more than the current section
            const belowSection = sections.find(section => section.order === sections[sectionIndex].order + 1);

            if (!belowSection) {
                console.log("No section found to swap with");
                return;

            // Swap the order numbers
            const tempOrder = sections[sectionIndex].order;
            sections[sectionIndex].order = belowSection.order;

                for (const mutation of mutationsList) {
                    if (mutation.type === 'attributes' && mutation.attributeName === 'class') {
                        const classList = mutation.target.classList;
                        if (classList.contains('open')) {
                            window.dispatchEvent(new Event('resize'));
                            observer.disconnect(); // Disconnect the observer to stop observing further mutations
                        }
                    }
                }
            });

    <!-- Preview and Resizing -->
    <script>
        const previewButton = document.getElementById('previewButton');
        const rightContainer = document.getElementById('rightContainer');
        const resizer = document.getElementById('resizer');
        const leftSide = document.querySelector('.content-container');
        const overlay = document.getElementById('overlay');
        let isResizing = false;

        previewButton.addEventListener('click', () => {
            rightContainer.classList.toggle('visible');
            reloadIframe()
        });

        resizer.addEventListener('mousedown', (e) => {
            isResizing = true;
            overlay.style.display = 'block'; // Show overlay during resizing
            document.addEventListener('mousemove', resize);
            document.addEventListener('mouseup', stopResize);
            e.preventDefault(); // Prevent text selection
        });

        function resize(e) {
            if (isResizing) {
                const containerOffsetLeft = leftSide.getBoundingClientRect().left;
                const pointerRelativeXpos = e.clientX - containerOffsetLeft;
                const leftWidth = pointerRelativeXpos;
                const rightWidth = document.body.offsetWidth - leftWidth - resizer.offsetWidth;

                leftSide.style.width = `${leftWidth}px`;
                rightContainer.style.width = `${rightWidth}px`;
            }
        }

        function stopResize() {
            isResizing = false;
            overlay.style.display = 'none'; // Hide overlay after resizing
            document.removeEventListener('mousemove', resize);
            document.removeEventListener('mouseup', stopResize);
        }
    </script>

    <!-- Image Functions -->
    <script>

        // Function to delete selected images for a specific section
        function deleteSelectedImages(sectionId) {
            // Check if there are selected images for this section
            if (selectedImages[sectionId] && selectedImages[sectionId].length > 0) {
                // Make a server request to delete the selected images for this section
                fetch("/delete_selected_images", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        sectionId: sectionId,
                        imageIds: selectedImages[sectionId]
                    })
                })
                    .then(response => response.json())
                    .then(data => {
                        if (data.status === 'success') {
                            console.log("Selected images deleted successfully for section", sectionId);
                            // Remove deleted images from the UI
                            selectedImages[sectionId] = []; // Clear the selected images list for this section
                            loadUploadedImages(sectionId); // Reload the uploaded images for this section
                        } else {
                            console.error("Failed to delete selected images for section", sectionId, ":", data.message);
                        }
                    })
                    .catch(error => console.error('Error:', error));
            } else {
                console.log("No selected images to delete for section", sectionId);
            }
        }

        var selectedImages = {};

        // Function to load uploaded images for a specific section
        function loadUploadedImages(sectionId) {
            fetch(`/get_uploaded_images?section_id=${sectionId}`)
                .then(response => response.json())
                .then(data => {
                    var uploadedImagesUl = document.getElementById(`sortable-${sectionId}`);
                    uploadedImagesUl.innerHTML = ""; // Clear previous images

                    // Check if the selected images list for this section exists, if not, create it
                    if (!selectedImages[sectionId]) {
                        selectedImages[sectionId] = [];
                    }

                    data.images.forEach(picture => {
                        var li = document.createElement("li");
                        li.setAttribute("data-order", picture.order); // Set data-order attribute for reordering
                        li.setAttribute("data-id", picture.id); // Set data-id attribute for image ID
                        li.setAttribute("data-section-id", sectionId); // Set data-section-id attribute for section ID
                        li.draggable = true;
                        li.addEventListener("dragstart", handleDragStart);
                        li.addEventListener("dragover", handleDragOver);
                        li.addEventListener("drop", handleDrop);
                        var img = document.createElement("img");
                        img.src = picture.url;

                        // Create checkbox element
                        var checkbox = document.createElement('input');
                        checkbox.type = 'checkbox';
                        checkbox.className = 'image-checkbox';
                        checkbox.style.position = 'relative';
                        checkbox.style.top = '5px'; // Adjust top position as needed
                        checkbox.style.right = '5px'; // Adjust right position as needed
                        checkbox.addEventListener('change', function () {
                            if (this.checked) {
                                // Add image to selected list for this section
                                addToSelectedImages(sectionId, picture.id);
                            } else {
                                // Remove image from selected list for this section
                                removeFromSelectedImages(sectionId, picture.id);
                            }
                        });

                        // Append image and checkbox to list item
                        li.appendChild(img);
                        li.appendChild(checkbox);
                        // Append list item to ul
                        uploadedImagesUl.appendChild(li);
                    });
                })
                .catch(error => console.error('Error:', error));
        }

        // Function to add image to the list of selected images for a specific section
        function addToSelectedImages(sectionId, imageId) {
            // Add image ID to the selected images list for this section
            selectedImages[sectionId].push(imageId);
            console.log('Image added to selected list for section', sectionId, ':', imageId);
        }

        // Function to remove image from the list of selected images for a specific section
        function removeFromSelectedImages(sectionId, imageId) {
            // Remove image ID from the selected images list for this section
            var index = selectedImages[sectionId].indexOf(imageId);
            if (index !== -1) {
                selectedImages[sectionId].splice(index, 1);
            }
            console.log('Image removed from selected list for section', sectionId, ':', imageId);
        }


        // Function to handle drag start event
        function handleDragStart(event) {
            event.dataTransfer.setData("text/plain", JSON.stringify({
                sourceOrder: event.target.dataset.order,
                sourceSection: event.target.dataset.sectionId
            }));
        }

        let dropHandled = false;

        function handleDrop(event) {
            event.preventDefault();

            // Check if the drop event has been handled already
            if (dropHandled) {
                return;
            }

            var sourceData = JSON.parse(event.dataTransfer.getData("text/plain"));
            var sourceOrder = sourceData.sourceOrder;
            var sourceSection = sourceData.sourceSection;

            var targetOrder = event.target.dataset.order;
            var targetId = event.target.dataset.id;
            var targetSection = event.target.dataset.sectionId;

            console.log("Source Order:", sourceOrder);
            console.log("Target Order:", targetOrder);
            console.log("Source Section:", sourceSection);
            console.log("Target Section:", targetSection);
            console.log("Target ID:", targetId);
            console.log("Event Target:", event.target);
            console.log("Event CurrentTarget:", event.currentTarget);
            // Check if the drop occurred on a different section
            if (sourceSection !== targetSection) {
                // Move the image to the target section
                moveImageToSection(sourceOrder, sourceSection, targetSection);
            } else if (sourceOrder !== targetOrder && sourceSection === targetSection) {
                // Swap images in the UI
                swapImages(sourceOrder, targetOrder, targetId, targetSection);
            }

            // Set dropHandled flag to true to indicate that the drop event has been handled
            dropHandled = true;
        }

        // Reset dropHandled flag when drag over event occurs
        function handleDragOver(event) {
            dropHandled = false;
            event.preventDefault();
            event.dataTransfer.dropEffect = "move";

            // Highlight the potential drop target by adding a class to the closest li element
            var closestLi = event.target.closest('li');
            if (closestLi) {
                closestLi.classList.add('drag-over');
            }

        }

        // Add event listeners for dragenter and dragleave on the ul element
        document.getElementById('sortable').addEventListener('dragenter', function (event) {
            var closestLi = event.target.closest('li');
            if (closestLi) {
                closestLi.classList.add('drag-over');
            }
        });

        document.getElementById('sortable').addEventListener('dragleave', function (event) {
            var closestLi = event.target.closest('li');
            if (closestLi) {
                closestLi.classList.remove('drag-over');
            }
        });

        // Load uploaded images when the page loads
        window.addEventListener("load", function () {
            loadUploadedImages();

        });


        // Function to add a slideshow image
        function addSlideshowImage(imageId, imageUrl, sectionId) {
            var formData = new FormData(document.getElementById("updateImageForm"));
            formData.append('section_id', sectionId); // Append sectionId to form data

            fetch("/update_public_images", {
                method: "POST",
                body: formData
            })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        // Add the slideshow image with the image ID and URL
                        var slideshowUl = document.getElementById("slideshowSortable");
                        var li = document.createElement("li");
                        var img = document.createElement("img");
                        li.draggable = true;
                        li.addEventListener("dragstart", handleDragStartSlideshow);
                        li.addEventListener("dragover", handleDragOver);
                        li.addEventListener("drop", handleDropSlideshow);
                        img.src = imageUrl;
                        li.appendChild(img);
                        li.setAttribute("data-id", imageId); // Set data-id attribute for image ID
                        slideshowUl.appendChild(li);
                        document.getElementById("message").innerHTML = "Image added to slideshow.";
                    } else {
                        document.getElementById("message").innerHTML = "Failed to add image to slideshow.";
                    }
                })
                .catch(error => console.error('Error:', error));
        }



        function handleDropSlideshow(event) {
            event.preventDefault();

            // Get the dragged index
            var draggedIndex = event.dataTransfer.getData("text/plain");

            // Check if the drop event originates from the uploaded images area
            var isFromUploaded = event.dataTransfer.getData("isFromUploaded") === "true";

            // If the drop event originates from the uploaded images area, do nothing
            if (isFromUploaded) {
                console.log("Image dragged from uploaded images, ignoring drop in slideshow.");
                return;
            }

            // Get the image ID of the dragged image
            var imageId = document.querySelector(`#sortable li[data-index="${draggedIndex}"]`).getAttribute("data-id");
            var sectionId = document.querySelector(`#sortable li[data-index="${draggedIndex}"]`).getAttribute("data-section-id");

            // Check if the dropped image is not already in the slideshow
            var slideshowImages = document.getElementById("slideshowSortable").querySelectorAll("li");
            var isAlreadyInSlideshow = Array.from(slideshowImages).some(li => li.dataset.id === imageId);

            if (!isAlreadyInSlideshow) {
                // Get the image URL from the uploaded images section
                var imageUrl;
                var uploadedImages = document.getElementById("sortable").querySelectorAll("li");
                uploadedImages.forEach(li => {
                    if (li.dataset.index === draggedIndex) {
                        imageUrl = li.querySelector("img").src;
                    }
                });

                // Add the slideshow image with the image ID and URL
                addSlideshowImage(imageId, imageUrl, sectionId);
            } else {
                console.log("Image already exists in the slideshow.");
            }
        }

        // Function to update the order of images on the server
        function updateImageOrder(order) {
            fetch("/update_image_order", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(order)  // Send the array of order objects directly
            })
                .then(response => response.json())
                .then(data => {

                    } else {

                        loadUploadedImages();

        function moveImageToSection(sourceOrder, sourceSection, targetSection) {
            // Make a server request to update the database with the new section ID for the image
            fetch("/move_image_to_section", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({

                    sourceSection: sourceSection,

                })
            })
                .then(response => response.json())
                .then(data => {

                })

        function updateUIAfterMove(sourceOrder, sourceSection, targetSection) {
            // Remove the image from the source section
            var sourceSectionContainer = document.getElementById(`sortable-${sourceSection}`);
            var sourceImage = sourceSectionContainer.querySelector(`li[data-order="${sourceOrder}"]`);
            sourceImage.remove();

            // Reload images for the source section
            loadUploadedImages(sourceSection);

            // Reload images for the target section
            loadUploadedImages(targetSection);
        }

        function swapImages(fromOrder, toOrder, targetId, sectionId) {
            var sortableId = "sortable-" + sectionId;
            var sortableContainer = document.getElementById(sortableId);
            if (!sortableContainer) {
                console.error("Sortable container not found for section ID:", sectionId);
                return;
            }

            var children = sortableContainer.children;
            if (!children) {
                console.error("Children of sortable container not found");
                return;
            }
            var fromIndex, toIndex;

            // Find the indexes of the source and target images based on their data-order attribute
            for (var i = 0; i < children.length; i++) {
                if (children[i].dataset.order === fromOrder) {
                    fromIndex = i;
                }
                if (children[i].dataset.order === toOrder) {
                    toIndex = i;
                }
            }

            // Reorder the images based on their data-order attribute
            if (fromIndex < toIndex) {
                // Move the source image after the target image
                sortableContainer.insertBefore(children[fromIndex], children[toIndex].nextSibling);
            } else {
                // Move the source image before the target image
                sortableContainer.insertBefore(children[fromIndex], children[toIndex]);
            }

            // Update the data-order attribute of each list item
            Array.from(children).forEach((image, index) => {
                image.dataset.order = index + 1; // Update the data-order attribute based on the new order
            });

            // Create an array of objects containing picture ID, new order, and section ID
            var orderData = Array.from(children).map((image) => {
                return { id: image.dataset.id, order: image.dataset.order, sectionId: sectionId };
            });

            // Update the image order with the new order associated with each picture
            updateImageOrder(orderData);
        }



        // Function to handle deletion of images using the trash can
        function handleDropTrash(event, source) {
            event.preventDefault();
            var order = event.dataTransfer.getData("text/plain");
            var imageToRemove = document.querySelector(`li[data-order="${order}"]`);
            if (imageToRemove) {
                // Display a confirmation dialog before deleting the image
                var confirmation = confirm("Are you sure you want to delete this image?");
                if (confirmation) {
                    // If the user confirms, proceed with deletion
                    var imageId = imageToRemove.dataset.id;
                    deleteImage(imageId); // Call the function to delete the image
                    imageToRemove.remove();
                }
            }
        }

        function deleteImage(imageId) {
            fetch("/delete_image", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ id: imageId })
            })
                .then(response => response.json())

                    if (data.status === 'success') {
                        console.log(data.message); // Log success message
                        showMessage(data.message);
                    } else {

                        showMessage(data.message);
                    }
                })
                .catch(error => console.error('Error:', error));
        }

    <!-- Text/Code Editor and Save Function -->
    <script>
        function showMessage(message) {
            var messageElement = document.getElementById('message');
            var messageContent = document.getElementById('messageContent');

            // Set message content
            messageContent.textContent = message;

            // Show the message
            messageElement.style.display = 'block';
        }

        function closeMessage() {
            var messageElement = document.getElementById('message');

            // Hide the message
            messageElement.style.display = 'none';
        }

        function initializeCodeMirror(textArea) {
            const editor = CodeMirror.fromTextArea(textArea, {
                mode: "htmlmixed",
                lineNumbers: true,
                theme: "dracula",
                autoCloseBrackets: true,
                lineWrapping: true,
                gutters: ["CodeMirror-lint-markers"],
                lint: {
                    getAnnotations: function (content) {
                        var result = []; // Initialize an empty array to store linting results

                        // Check for unclosed HTML tags
                        var tagRegex = /<([^\/!][^\s>]*)\b[^>]*>(?![\s\S]*?<\/\1>)/g;
                        var match;
                        while ((match = tagRegex.exec(content)) !== null) {
                            result.push({
                                message: "Unclosed tag: <" + match[1] + ">",
                                severity: "error",
                                from: CodeMirror.Pos(content.substr(0, match.index).split('\n').length - 1, match.index - content.lastIndexOf('\n', match.index - 1) - 1),
                                to: CodeMirror.Pos(content.substr(0, match.index).split('\n').length - 1, match.index - content.lastIndexOf('\n', match.index - 1))
                            });
                        }

                        // Check for unclosed curly braces
                        var braceStack = [];
                        for (var i = 0; i < content.length; i++) {
                            if (content[i] === '{') {
                                braceStack.push(i);
                            } else if (content[i] === '}') {
                                if (braceStack.length > 0) {
                                    braceStack.pop();
                                } else {
                                    result.push({
                                        message: "Unmatched closing brace: }",
                                        severity: "error",
                                        from: CodeMirror.Pos(content.substr(0, i).split('\n').length - 1, i - content.lastIndexOf('\n', i - 1) - 1),
                                        to: CodeMirror.Pos(content.substr(0, i).split('\n').length - 1, i - content.lastIndexOf('\n', i - 1))
                                    });
                                }
                            }
                        }

                        while (braceStack.length > 0) {
                            var unmatchedIndex = braceStack.pop();
                            result.push({
                                message: "Unclosed brace: {",
                                severity: "error",
                                from: CodeMirror.Pos(content.substr(0, unmatchedIndex).split('\n').length - 1, unmatchedIndex - content.lastIndexOf('\n', unmatchedIndex - 1) - 1),
                                to: CodeMirror.Pos(content.substr(0, unmatchedIndex).split('\n').length - 1, unmatchedIndex - content.lastIndexOf('\n', unmatchedIndex - 1))
                            });
                        }

                        // Check for unclosed parentheses
                        var parenStack = [];
                        for (var i = 0; i < content.length; i++) {
                            if (content[i] === '(') {
                                parenStack.push(i);
                            } else if (content[i] === ')') {
                                if (parenStack.length > 0) {
                                    parenStack.pop();
                                } else {
                                    result.push({
                                        message: "Unmatched closing parenthesis: )",
                                        severity: "error",
                                        from: CodeMirror.Pos(content.substr(0, i).split('\n').length - 1, i - content.lastIndexOf('\n', i - 1) - 1),
                                        to: CodeMirror.Pos(content.substr(0, i).split('\n').length - 1, i - content.lastIndexOf('\n', i - 1))
                                    });
                                }
                            }
                        }

                        while (parenStack.length > 0) {
                            var unmatchedIndex = parenStack.pop();
                            result.push({
                                message: "Unclosed parenthesis: (",
                                severity: "error",
                                from: CodeMirror.Pos(content.substr(0, unmatchedIndex).split('\n').length - 1, unmatchedIndex - content.lastIndexOf('\n', unmatchedIndex - 1) - 1),
                                to: CodeMirror.Pos(content.substr(0, unmatchedIndex).split('\n').length - 1, unmatchedIndex - content.lastIndexOf('\n', unmatchedIndex - 1))
                            });
                        }
                        // Check for missing semicolons only in JavaScript and CSS
                        var lines = content.split('\n');
                        for (var i = 0; i < lines.length; i++) {
                            var line = lines[i].trim();
                            if (!line.includes('<') && !line.includes('>')) { // Exclude lines containing < and >
                                // Check if the line is a continuation of an expression or a template literal
                                if (line && !line.endsWith(';') && !line.endsWith('}') && !line.endsWith('{') && !line.endsWith(')') && !line.endsWith(',') && !/[\+\-\*\/=]$/.test(line) && !/\$\{[^}]+\}$/.test(line)) {
                                    result.push({
                                        message: "Missing semicolon or incorrect line termination",
                                        severity: "error",
                                        from: CodeMirror.Pos(i, 0),
                                        to: CodeMirror.Pos(i, lines[i].length)
                                    });
                                }
                            }
                        }

                        return result;
                    }
                }
            });
            codeMirrorEditors.push(editor);

            // Attach format code button to this specific CodeMirror instance
            const formatCodeButton = textArea.closest('.page-body-container').querySelector('.formatCodeButton');
            formatCodeButton.addEventListener('click', function () {
                formatCode(editor);
            });
            return editor;
        }
        const codeMirrorEditors = [];

        function formatCode(editor) {
            if (editor) {
                var content = editor.getValue();
                var mode = editor.getOption("mode");
                var formattedContent;

                if (mode === "htmlmixed") {
                    formattedContent = html_beautify(content, {
                        indent_size: 4,
                        indent_char: ' ',
                        max_preserve_newlines: 1,
                        preserve_newlines: true,
                        indent_inner_html: true,
                        wrap_line_length: 80,
                        end_with_newline: true
                    });
                } else if (mode === "css") {
                    formattedContent = css_beautify(content, {
                        indent_size: 4,
                        indent_char: ' ',
                        max_preserve_newlines: 1,
                        preserve_newlines: true,
                        wrap_line_length: 80,
                        end_with_newline: true
                    });
                } else {
                    formattedContent = js_beautify(content, {
                        indent_size: 4,
                        indent_char: ' ',
                        max_preserve_newlines: 1,
                        preserve_newlines: true,
                        brace_style: "collapse",
                        wrap_line_length: 80,
                        end_with_newline: true
                    });
                }

                editor.setValue(formattedContent);
            }
        }

        function showMessage(message) {
            alert(message);
        }

        function handleSubmit(classSelector, endpoint) {

            forms.forEach((form) => {

                    // Save content from the correct CodeMirror instance

                    formData.append("section_type", this.dataset.sectionType);

                    fetch(endpoint, {

                    })

                        .then(data => {
                            if (data.status === 'success') {
                                // showMessage(data.message);
                                // loadUploadedImages();
                            } else {
                                showMessage(data.message);
                            }
                        })
                        .catch(error => console.error('Error:', error));
                });
            });
            // reloadIframe();
        }

        handleSubmit("update-section-form", "/update_section");

        document.getElementById("saveChangesButton").addEventListener("click", function () {
            const forms = document.querySelectorAll(".update-section-form");
            forms.forEach((form) => {
                const editor = codeMirrorEditors.find(ed => ed.getTextArea() === form.querySelector('textarea'));

                    editor.save(); // Ensure all CodeMirror instances save their content back to the textareas
                }
                form.requestSubmit();
            });
            setTimeout(function () {
                reloadIframe();
            }, 100);

        });

        document.addEventListener("DOMContentLoaded", function () {
            // Function to initialize CodeMirror for a textarea
            // initializeCodeMirror()
            // Select all textareas within page-body-container and initialize CodeMirror for each
            const textAreas = document.querySelectorAll(".page-body-container textarea");
