{% extends 'base.html' %}
{% block content %}
{% include 'components/navbar.html' %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/calendars.css') }}">
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

<style>
.qe-page { display: grid; grid-template-columns: 300px 1fr; gap: 24px; max-width: 1100px; margin: 0 auto; padding: 24px 20px 60px; align-items: start; }
@media (max-width: 820px) { .qe-page { grid-template-columns: 1fr; } }

.qe-subnav { grid-column: 1 / -1; display: flex; align-items: center; gap: 14px; margin-bottom: 4px; flex-wrap: wrap; }
.qe-back { display: inline-flex; align-items: center; gap: 7px; color: rgba(255,255,255,0.5); font-size: 0.85rem; text-decoration: none; }
.qe-back:hover { color: rgba(255,255,255,0.85); }
.qe-title { font-size: 1.25rem; font-weight: 800; color: #fff; margin: 0; }

.qe-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.09); border-radius: 14px; padding: 16px; }
.qe-panel-title { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.4); margin: 0 0 12px; }

.qe-add { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.qe-mini-btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 11px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; cursor: pointer; border: 1px solid rgba(255,255,255,0.13); background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.8); }
.qe-mini-btn:hover { background: rgba(255,255,255,0.12); }

.qe-qlist { list-style: none; margin: 0; padding: 0; }
.qe-qitem { display: flex; align-items: center; gap: 8px; padding: 9px 10px; margin: 4px 0; border-radius: 8px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); cursor: pointer; }
.qe-qitem:hover { background: rgba(255,255,255,0.08); }
.qe-qitem.is-selected { border-color: rgba(94,238,248,0.5); background: rgba(94,238,248,0.1); }
.qe-handle { cursor: grab; color: rgba(255,255,255,0.3); font-size: 0.8rem; }
.qe-qtype { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #5eeec8; flex-shrink: 0; }
.qe-qprompt { flex: 1; font-size: 0.85rem; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.qe-empty { font-size: 0.82rem; color: rgba(255,255,255,0.3); padding: 18px 6px; text-align: center; }

.qe-field { margin-bottom: 14px; }
.qe-label { display: block; font-size: 0.74rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: rgba(255,255,255,0.4); margin-bottom: 6px; }
.qe-input, .qe-textarea, .qe-select { width: 100%; padding: 10px 12px; border-radius: 8px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.13); color: #fff; font-size: 0.92rem; outline: none; box-sizing: border-box; font-family: inherit; }
.qe-input:focus, .qe-textarea:focus, .qe-select:focus { border-color: rgba(94,238,248,0.4); }
.qe-textarea { resize: vertical; min-height: 70px; }
.qe-select option { background: #16161f; }

.qe-opt-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.qe-opt-correct { width: 18px; height: 18px; accent-color: #5eeec8; flex-shrink: 0; cursor: pointer; }
.qe-opt-text { flex: 1; }
.qe-opt-remove { background: rgba(255,80,80,0.12); color: #ff6b6b; border: 1px solid rgba(255,80,80,0.22); border-radius: 7px; width: 32px; height: 36px; cursor: pointer; flex-shrink: 0; }
.qe-opt-remove:hover { background: rgba(255,80,80,0.22); }
.qe-correct-hint { font-size: 0.72rem; color: rgba(94,238,200,0.7); margin: -2px 0 10px; }

.qe-actions { display: flex; gap: 10px; margin-top: 18px; }
.qe-btn { display: inline-flex; align-items: center; gap: 7px; padding: 9px 16px; border-radius: 9px; font-size: 0.88rem; font-weight: 700; border: none; cursor: pointer; }
.qe-btn-primary { background: linear-gradient(135deg, #5eeef8, #5eeec8); color: #111; }
.qe-btn-primary:hover { opacity: 0.88; }
.qe-btn-danger { background: rgba(255,80,80,0.12); color: #ff6b6b; border: 1px solid rgba(255,80,80,0.25); }
.qe-btn-danger:hover { background: rgba(255,80,80,0.22); }
.qe-placeholder { color: rgba(255,255,255,0.35); font-size: 0.9rem; text-align: center; padding: 60px 20px; }
.qe-check-row { display: flex; align-items: center; gap: 10px; font-size: 0.88rem; color: rgba(255,255,255,0.8); }
.qe-check-row input { width: 16px; height: 16px; accent-color: #5eeef8; }

/* Cell editor (text-or-image) used by matching + ordering */
.qe-cell { border: 1px solid rgba(255,255,255,0.12); border-radius: 9px; padding: 9px; background: rgba(255,255,255,0.03); }
.qe-cell-head { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.qe-cell-kind { padding: 4px 8px; border-radius: 7px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.13); color: #fff; font-size: 0.78rem; }
.qe-cell-thumb { width: 100%; max-height: 120px; object-fit: contain; border-radius: 7px; background: rgba(0,0,0,0.25); margin-top: 6px; }
.qe-pair { display: grid; grid-template-columns: 1fr 18px 1fr 34px; gap: 8px; align-items: start; margin-bottom: 10px; }
.qe-pair-arrow { align-self: center; text-align: center; color: rgba(94,238,200,0.6); }
@media (max-width: 600px) { .qe-pair { grid-template-columns: 1fr; } .qe-pair-arrow { display:none; } }
.qe-order-item { display: grid; grid-template-columns: 22px 1fr auto 34px; gap: 8px; align-items: start; margin-bottom: 10px; }
.qe-order-pos { width: 22px; height: 22px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; background: rgba(94,238,248,0.18); color: #5eeef8; font-size: 0.72rem; font-weight: 700; margin-top: 8px; }
.qe-order-moves { display: flex; flex-direction: column; gap: 3px; }
.qe-move { width: 30px; height: 22px; border: 1px solid rgba(255,255,255,0.18); background: rgba(255,255,255,0.06); color: #fff; border-radius: 6px; cursor: pointer; line-height: 1; font-size: 0.7rem; }
.qe-move:disabled { opacity: 0.3; cursor: default; }
.qe-img-opt { display: grid; grid-template-columns: 26px 1fr 34px; gap: 8px; align-items: start; margin-bottom: 10px; }
.qe-img-opt-correct { width: 18px; height: 18px; accent-color: #5eeec8; margin-top: 9px; }
.qe-blank-row { border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 9px; margin-bottom: 8px; }
.qe-blank-tag { font-size: 0.7rem; font-weight: 700; color: #5eeec8; text-transform: uppercase; letter-spacing: 0.05em; }

/* Image picker modal */
.qp-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 9999; align-items: center; justify-content: center; }
.qp-modal { width: min(640px, 92vw); max-height: 82vh; display: flex; flex-direction: column; background: #16161f; border: 1px solid rgba(255,255,255,0.12); border-radius: 14px; overflow: hidden; }
.qp-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
.qp-head h3 { margin: 0; font-size: 1rem; color: #fff; }
.qp-body { padding: 14px 16px; overflow-y: auto; }
.qp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
.qp-item { border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; overflow: hidden; cursor: pointer; aspect-ratio: 1; }
.qp-item:hover { border-color: rgba(94,238,248,0.5); }
.qp-item img { width: 100%; height: 100%; object-fit: cover; }
.qp-folder { display: inline-flex; align-items: center; gap: 6px; padding: 7px 11px; margin: 0 6px 8px 0; border-radius: 8px; border: 1px solid rgba(255,255,255,0.13); background: rgba(255,255,255,0.06); color: #fff; cursor: pointer; font-size: 0.82rem; }
.qp-close { background: none; border: none; color: rgba(255,255,255,0.6); font-size: 1.4rem; cursor: pointer; }
</style>

<div class="qe-page">
    <div class="qe-subnav">
        <a href="{{ url_for('admin_quizzes_page') }}" class="qe-back"><i class="fas fa-arrow-left"></i> Quizzes</a>
        <h1 class="qe-title">{{ quiz.title }}</h1>
    </div>

    <!-- Question list -->
    <div class="qe-card">
        <p class="qe-panel-title">Questions</p>
        <div class="qe-add">
            <button class="qe-mini-btn" onclick="newQuestion('single_choice')"><i class="fas fa-dot-circle"></i> Single</button>
            <button class="qe-mini-btn" onclick="newQuestion('multi_choice')"><i class="fas fa-check-square"></i> Multi</button>
            <button class="qe-mini-btn" onclick="newQuestion('true_false')"><i class="fas fa-toggle-on"></i> T/F</button>
            <button class="qe-mini-btn" onclick="newQuestion('short_text')"><i class="fas fa-keyboard"></i> Text</button>
            <button class="qe-mini-btn" onclick="newQuestion('fill_blank')"><i class="fas fa-i-cursor"></i> Fill blank</button>
            <button class="qe-mini-btn" onclick="newQuestion('matching')"><i class="fas fa-link"></i> Matching</button>
            <button class="qe-mini-btn" onclick="newQuestion('ordering')"><i class="fas fa-sort"></i> Ordering</button>
            <button class="qe-mini-btn" onclick="newQuestion('image_choice')"><i class="fas fa-images"></i> Image</button>
            <button class="qe-mini-btn" onclick="newQuestion('coding')"><i class="fas fa-code"></i> Code</button>
        </div>
        <ul class="qe-qlist" id="qList"></ul>
        <div class="qe-empty" id="qEmpty" style="display:none;">No questions yet. Add one above.</div>
    </div>

    <!-- Editor -->
    <div class="qe-card">
        <div class="qe-placeholder" id="qPlaceholder">
            Select a question on the left, or add one to begin.
        </div>
        <div id="qForm" style="display:none;">
            <input type="hidden" id="qId">
            <input type="hidden" id="qType">
            <div class="qe-field">
                <label class="qe-label" id="qTypeLabel"></label>
                <textarea id="qPrompt" class="qe-textarea" placeholder="Write the question…"></textarea>
            </div>
            <div id="qBody"></div>
            <div class="qe-field" style="max-width:140px;">
                <label class="qe-label">Points</label>
                <input type="number" id="qPoints" class="qe-input" min="1" value="1">
            </div>
            <div class="qe-actions">
                <button class="qe-btn qe-btn-primary" onclick="saveQuestion()"><i class="fas fa-check"></i> Save question</button>
                <button class="qe-btn qe-btn-danger" id="qDeleteBtn" onclick="deleteQuestion()" style="display:none;"><i class="fas fa-trash"></i> Delete</button>
            </div>
        </div>
    </div>
</div>

<!-- Image library picker -->
<div class="qp-overlay" id="qpOverlay" onclick="if(event.target===this)closeQuizPicker()">
    <div class="qp-modal">
        <div class="qp-head">
            <h3>Choose an image</h3>
            <div style="display:flex;gap:10px;align-items:center;">
                <button class="qe-mini-btn" onclick="qpUseUrl()"><i class="fas fa-link"></i> Use URL</button>
                <button class="qp-close" onclick="closeQuizPicker()">&times;</button>
            </div>
        </div>
        <div class="qp-body" id="qpBody"></div>
    </div>
</div>

<script>
const QUIZ_ID = {{ quiz.id }};
let QUESTIONS = {{ questions | tojson }};
let _editing = null;       // current question object in the form (may be unsaved)
let _sortable = null;

const TYPE_LABELS = {
    single_choice: 'Single choice',
    multi_choice:  'Multiple choice',
    true_false:    'True / False',
    short_text:    'Short text answer',
    fill_blank:    'Fill in the blank',
    matching:      'Matching',
    ordering:      'Ordering',
    image_choice:  'Image choice',
    coding:        'Coding challenge',
};

const CODE_LANGS = { python: 'Python', javascript: 'JavaScript', java: 'Java', c: 'C', cpp: 'C++' };

document.addEventListener('DOMContentLoaded', renderList);

function renderList() {
    const ul = document.getElementById('qList');
    ul.innerHTML = '';
    QUESTIONS.forEach(q => ul.appendChild(qItemEl(q)));
    document.getElementById('qEmpty').style.display = QUESTIONS.length ? 'none' : 'block';
    if (_sortable) _sortable.destroy();
    _sortable = Sortable.create(ul, { handle: '.qe-handle', animation: 150, onEnd: persistOrder });
}

function qItemEl(q) {
    const li = document.createElement('li');
    li.className = 'qe-qitem' + (_editing && _editing.id === q.id ? ' is-selected' : '');
    li.dataset.id = q.id;
    li.innerHTML =
        `<i class="fas fa-grip-vertical qe-handle"></i>` +
        `<span class="qe-qtype">${shortType(q.question_type)}</span>` +
        `<span class="qe-qprompt"></span>`;
    li.querySelector('.qe-qprompt').textContent = q.prompt || '(no prompt)';
    li.addEventListener('click', e => { if (!e.target.classList.contains('qe-handle')) editQuestion(q.id); });
    return li;
}

function shortType(t) {
    return { single_choice: 'Single', multi_choice: 'Multi', true_false: 'T/F', short_text: 'Text',
             fill_blank: 'Blank', matching: 'Match', ordering: 'Order', image_choice: 'Image', coding: 'Code' }[t] || t;
}

function persistOrder() {
    const items = Array.from(document.querySelectorAll('#qList .qe-qitem'))
        .map((li, idx) => ({ id: parseInt(li.dataset.id), sort_order: idx }));
    // Reflect new order locally too
    items.forEach(it => { const q = QUESTIONS.find(x => x.id === it.id); if (q) q.sort_order = it.sort_order; });
    QUESTIONS.sort((a, b) => a.sort_order - b.sort_order);
    fetch(`/admin/quizzes/${QUIZ_ID}/questions/reorder`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ items }),
    }).catch(() => alert('Failed to save order'));
}

function emptyCell() { return { kind: 'text', text: '', image_url: '' }; }

function blankConfig(type) {
    if (type === 'true_false') {
        return { options: [{ id: 1, text: 'True', correct: true }, { id: 2, text: 'False', correct: false }] };
    }
    if (type === 'short_text') return { accepted: [''], case_sensitive: false };
    if (type === 'fill_blank') return { blanks: [] };
    if (type === 'matching') return { pairs: [{ left: emptyCell(), right: emptyCell() }, { left: emptyCell(), right: emptyCell() }] };
    if (type === 'ordering') return { items: [emptyCell(), emptyCell()] };
    if (type === 'image_choice') return { multiple: false, options: [{ image_url: '', caption: '', correct: true }, { image_url: '', caption: '', correct: false }] };
    if (type === 'coding') return { language: 'python', mode: 'run', starter_code: '', test_cases: [{ stdin: '', expected: '' }] };
    return { options: [{ id: 1, text: '', correct: true }, { id: 2, text: '', correct: false }] };
}

function newQuestion(type) {
    _editing = { id: null, question_type: type, prompt: '', points: 1, config: blankConfig(type) };
    showForm();
    document.querySelectorAll('#qList .qe-qitem').forEach(li => li.classList.remove('is-selected'));
}

function editQuestion(id) {
    const q = QUESTIONS.find(x => x.id === id);
    if (!q) return;
    _editing = JSON.parse(JSON.stringify(q));   // edit a copy
    showForm();
    renderList();
}

function showForm() {
    document.getElementById('qPlaceholder').style.display = 'none';
    document.getElementById('qForm').style.display = 'block';
    document.getElementById('qId').value = _editing.id || '';
    document.getElementById('qType').value = _editing.question_type;
    document.getElementById('qTypeLabel').textContent = TYPE_LABELS[_editing.question_type] + ' — prompt';
    document.getElementById('qPrompt').value = _editing.prompt || '';
    document.getElementById('qPoints').value = _editing.points || 1;
    document.getElementById('qDeleteBtn').style.display = _editing.id ? 'inline-flex' : 'none';
    // Fill-blank: live-sync the blank rows as the prompt's ___ markers change.
    document.getElementById('qPrompt').oninput = (_editing.question_type === 'fill_blank') ? renderBody : null;
    renderBody();
}

function renderBody() {
    const body = document.getElementById('qBody');
    const t = _editing.question_type;
    const cfg = _editing.config || blankConfig(t);
    _editing.config = cfg;

    if (t === 'short_text') {
        let html = '<div class="qe-field"><label class="qe-label">Accepted answers</label>';
        html += '<p class="qe-correct-hint">A response matching any of these (trimmed) counts as correct.</p>';
        html += '<div id="qAccepted">';
        (cfg.accepted || ['']).forEach((a, i) => {
            html += acceptedRow(a, i);
        });
        html += '</div>';
        html += '<button type="button" class="qe-mini-btn" onclick="addAccepted()" style="margin-top:4px;"><i class="fas fa-plus"></i> Add answer</button>';
        html += '</div>';
        html += `<label class="qe-check-row" style="margin-top:8px;"><input type="checkbox" id="qCaseSensitive" ${cfg.case_sensitive ? 'checked' : ''}> Case sensitive</label>`;
        body.innerHTML = html;
        return;
    }

    if (t === 'fill_blank') {
        syncBlanksState();
        const blanks = cfg.blanks || [];
        let html = `<p class="qe-correct-hint">Type 3 or more underscores (<code>___</code>) in the prompt above wherever a blank should appear. ${blanks.length} blank(s) detected.</p>`;
        blanks.forEach((b, i) => {
            html += `<div class="qe-blank-row"><div class="qe-blank-tag">Blank ${i + 1}</div>
                <input class="qe-input" style="margin-top:7px;" value="${escAttr((b.accepted || []).join(', '))}" placeholder="Accepted answers, comma-separated" oninput="onBlankAccepted(${i}, this.value)">
                <label class="qe-check-row" style="margin-top:6px;font-size:0.8rem;"><input type="checkbox" ${b.case_sensitive ? 'checked' : ''} onchange="onBlankCase(${i}, this.checked)"> Case sensitive</label></div>`;
        });
        if (!blanks.length) html += '<p class="qe-placeholder" style="padding:20px;">No blanks yet — add <code>___</code> to the prompt.</p>';
        body.innerHTML = html;
        return;
    }

    if (t === 'matching') {
        let html = '<div class="qe-field"><label class="qe-label">Pairs</label>';
        html += '<p class="qe-correct-hint">Each item (left) matches the description (right). Either side can be text or an image. Readers see them shuffled.</p>';
        (cfg.pairs || []).forEach((p, i) => {
            html += `<div class="qe-pair"><div>${cellEditorHtml(p.left, 'm', i, 'left')}</div>
                <div class="qe-pair-arrow"><i class="fas fa-arrows-alt-h"></i></div>
                <div>${cellEditorHtml(p.right, 'm', i, 'right')}</div>
                <button type="button" class="qe-opt-remove" onclick="removePair(${i})">&times;</button></div>`;
        });
        html += '</div><button type="button" class="qe-mini-btn" onclick="addPair()"><i class="fas fa-plus"></i> Add pair</button>';
        body.innerHTML = html;
        return;
    }

    if (t === 'ordering') {
        let html = '<div class="qe-field"><label class="qe-label">Items in correct order</label>';
        html += '<p class="qe-correct-hint">Enter items top-to-bottom in the correct order (text or image). Readers see them shuffled and must reorder.</p>';
        (cfg.items || []).forEach((it, i) => {
            html += `<div class="qe-order-item"><span class="qe-order-pos">${i + 1}</span>
                <div>${cellEditorHtml(it, 'o', i, null)}</div>
                <div class="qe-order-moves">
                    <button type="button" class="qe-move" onclick="moveOrder(${i},-1)" ${i === 0 ? 'disabled' : ''}>▲</button>
                    <button type="button" class="qe-move" onclick="moveOrder(${i},1)" ${i === cfg.items.length - 1 ? 'disabled' : ''}>▼</button>
                </div>
                <button type="button" class="qe-opt-remove" onclick="removeOrderItem(${i})">&times;</button></div>`;
        });
        html += '</div><button type="button" class="qe-mini-btn" onclick="addOrderItem()"><i class="fas fa-plus"></i> Add item</button>';
        body.innerHTML = html;
        return;
    }

    if (t === 'image_choice') {
        const multiple = !!cfg.multiple;
        let html = `<label class="qe-check-row" style="margin-bottom:10px;"><input type="checkbox" ${multiple ? 'checked' : ''} onchange="onImgMultiple(this.checked)"> Allow multiple correct answers</label>`;
        html += '<div class="qe-field"><label class="qe-label">Image options</label>';
        html += `<p class="qe-correct-hint">${multiple ? 'Tick every correct image.' : 'Tick the one correct image.'}</p>`;
        (cfg.options || []).forEach((o, i) => {
            html += `<div class="qe-img-opt">
                <input class="qe-img-opt-correct" type="${multiple ? 'checkbox' : 'radio'}" name="imgcorrect" ${o.correct ? 'checked' : ''} onchange="onImgCorrect(${i}, ${multiple})">
                <div class="qe-cell">${imageFieldHtml(o.image_url, 'i', i, null)}
                    <input class="qe-input" style="margin-top:7px;" value="${escAttr(o.caption || '')}" placeholder="Caption (optional)" oninput="onImgCaption(${i}, this.value)"></div>
                <button type="button" class="qe-opt-remove" onclick="removeImgOption(${i})">&times;</button></div>`;
        });
        html += '</div><button type="button" class="qe-mini-btn" onclick="addImgOption()"><i class="fas fa-plus"></i> Add image</button>';
        body.innerHTML = html;
        return;
    }

    if (t === 'coding') {
        const mode = (cfg.mode === 'compile') ? 'compile' : 'run';
        let html = '<div class="qe-field"><label class="qe-label">Language</label>';
        html += '<select class="qe-select" onchange="onCodeLang(this.value)">';
        Object.keys(CODE_LANGS).forEach(k => {
            html += `<option value="${k}"${cfg.language === k ? ' selected' : ''}>${CODE_LANGS[k]}</option>`;
        });
        html += '</select></div>';

        html += '<div class="qe-field"><label class="qe-label">Grading mode</label>';
        html += `<label class="qe-check-row" style="margin-bottom:6px;"><input type="radio" name="codemode" ${mode === 'run' ? 'checked' : ''} onchange="onCodeMode('run')"> Run against test cases (output must match)</label>`;
        html += `<label class="qe-check-row"><input type="radio" name="codemode" ${mode === 'compile' ? 'checked' : ''} onchange="onCodeMode('compile')"> Compiles cleanly (no run — passes if it's written correctly)</label>`;
        html += '</div>';

        html += '<div class="qe-field"><label class="qe-label">Starter code <span style="opacity:0.5;font-weight:400;text-transform:none;">(optional — prefilled in the learner\'s editor)</span></label>';
        html += `<textarea class="qe-textarea qe-code-area" style="min-height:120px;font-family:ui-monospace,Menlo,Consolas,monospace;" placeholder="// shown to the learner to start from" oninput="onCodeStarter(this.value)">${escHtmlText(cfg.starter_code || '')}</textarea></div>`;
        if (cfg.language === 'java') {
            html += '<p class="qe-correct-hint">Java: name the public class to match what you want, e.g. <code>public class Main</code>.</p>';
        }

        if (mode === 'run') {
            html += '<div class="qe-field"><label class="qe-label">Test cases</label>';
            html += '<p class="qe-correct-hint">Each case feeds optional input (stdin) and checks the program\'s output. All must pass. Comparison ignores trailing whitespace.</p>';
            (cfg.test_cases || []).forEach((tc, i) => {
                html += `<div class="qe-blank-row">
                    <div style="display:flex;align-items:center;justify-content:space-between;"><span class="qe-blank-tag">Case ${i + 1}</span>
                    <button type="button" class="qe-opt-remove" style="height:28px;width:28px;" onclick="removeTestCase(${i})">&times;</button></div>
                    <label class="qe-label" style="margin-top:6px;">Input (stdin)</label>
                    <textarea class="qe-textarea" style="min-height:48px;font-family:ui-monospace,monospace;" placeholder="(optional)" oninput="onTestStdin(${i}, this.value)">${escHtmlText(tc.stdin || '')}</textarea>
                    <label class="qe-label" style="margin-top:6px;">Expected output</label>
                    <textarea class="qe-textarea" style="min-height:48px;font-family:ui-monospace,monospace;" placeholder="exact program output" oninput="onTestExpected(${i}, this.value)">${escHtmlText(tc.expected || '')}</textarea>
                </div>`;
            });
            html += '</div><button type="button" class="qe-mini-btn" onclick="addTestCase()"><i class="fas fa-plus"></i> Add test case</button>';
        }
        body.innerHTML = html;
        return;
    }

    // choice types
    const isMulti = (t === 'multi_choice');
    const isTF = (t === 'true_false');
    let html = '<div class="qe-field"><label class="qe-label">Options</label>';
    html += `<p class="qe-correct-hint">${isMulti ? 'Tick every correct option.' : 'Tick the one correct option.'}</p>`;
    html += '<div id="qOptions">';
    (cfg.options || []).forEach((o, i) => { html += optionRow(o, i, isMulti, isTF); });
    html += '</div>';
    if (!isTF) html += '<button type="button" class="qe-mini-btn" onclick="addOption()" style="margin-top:4px;"><i class="fas fa-plus"></i> Add option</button>';
    html += '</div>';
    body.innerHTML = html;
}

function optionRow(o, i, isMulti, isTF) {
    const inputType = isMulti ? 'checkbox' : 'radio';
    return `<div class="qe-opt-row" data-idx="${i}">
        <input class="qe-opt-correct" type="${inputType}" name="qcorrect" ${o.correct ? 'checked' : ''} onchange="onCorrectChange(${i}, ${isMulti})">
        <input class="qe-input qe-opt-text" type="text" value="${escAttr(o.text || '')}" placeholder="Option text" oninput="onOptionText(${i}, this.value)" ${isTF ? 'readonly' : ''}>
        ${isTF ? '' : `<button type="button" class="qe-opt-remove" onclick="removeOption(${i})">&times;</button>`}
    </div>`;
}

function acceptedRow(val, i) {
    return `<div class="qe-opt-row" data-idx="${i}">
        <input class="qe-input qe-opt-text" type="text" value="${escAttr(val || '')}" placeholder="Accepted answer" oninput="onAccepted(${i}, this.value)">
        <button type="button" class="qe-opt-remove" onclick="removeAccepted(${i})">&times;</button>
    </div>`;
}

function escAttr(s) { return String(s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;'); }
function escHtmlText(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

// ── coding question handlers ────────────────────────────────────────────────
function onCodeLang(v) { _editing.config.language = v; renderBody(); }
function onCodeMode(v) {
    _editing.config.mode = v;
    if (v === 'run' && !(_editing.config.test_cases && _editing.config.test_cases.length)) {
        _editing.config.test_cases = [{ stdin: '', expected: '' }];
    }
    renderBody();
}
function onCodeStarter(v) { _editing.config.starter_code = v; }
function onTestStdin(i, v) { _editing.config.test_cases[i].stdin = v; }
function onTestExpected(i, v) { _editing.config.test_cases[i].expected = v; }
function addTestCase() { (_editing.config.test_cases = _editing.config.test_cases || []).push({ stdin: '', expected: '' }); renderBody(); }
function removeTestCase(i) {
    if ((_editing.config.test_cases || []).length <= 1) { alert('Keep at least one test case.'); return; }
    _editing.config.test_cases.splice(i, 1); renderBody();
}

function onCorrectChange(i, isMulti) {
    const opts = _editing.config.options;
    if (isMulti) {
        opts[i].correct = !opts[i].correct;
    } else {
        opts.forEach((o, j) => o.correct = (j === i));
    }
}
function onOptionText(i, v) { _editing.config.options[i].text = v; }
function addOption() {
    const opts = _editing.config.options;
    opts.push({ id: opts.length + 1, text: '', correct: false });
    renderBody();
}
function removeOption(i) {
    const opts = _editing.config.options;
    if (opts.length <= 2) { alert('Keep at least two options.'); return; }
    opts.splice(i, 1);
    opts.forEach((o, j) => o.id = j + 1);
    renderBody();
}
function onAccepted(i, v) { _editing.config.accepted[i] = v; }
function addAccepted() { _editing.config.accepted.push(''); renderBody(); }
function removeAccepted(i) {
    if (_editing.config.accepted.length <= 1) { alert('Keep at least one accepted answer.'); return; }
    _editing.config.accepted.splice(i, 1);
    renderBody();
}

// ── fill in the blank ───────────────────────────────────────────────────────
function syncBlanksState() {
    const prompt = document.getElementById('qPrompt').value || '';
    const n = (prompt.match(/_{3,}/g) || []).length;
    const blanks = _editing.config.blanks || (_editing.config.blanks = []);
    while (blanks.length < n) blanks.push({ accepted: [], case_sensitive: false });
    while (blanks.length > n) blanks.pop();
}
function onBlankAccepted(i, v) { _editing.config.blanks[i].accepted = v.split(',').map(s => s.trim()).filter(Boolean); }
function onBlankCase(i, c) { _editing.config.blanks[i].case_sensitive = c; }

// ── shared text/image cell editor (matching + ordering) ─────────────────────
function _cellRef(kind, i, side) {
    if (kind === 'm') return _editing.config.pairs[i][side];
    if (kind === 'o') return _editing.config.items[i];
    if (kind === 'i') return _editing.config.options[i];
    return null;
}
function cellEditorHtml(cell, kind, i, side) {
    cell = cell || emptyCell();
    const sideArg = side ? `'${side}'` : 'null';
    let h = `<div class="qe-cell"><div class="qe-cell-head">
        <select class="qe-cell-kind" onchange="onCellKind('${kind}',${i},${sideArg},this.value)">
            <option value="text"${cell.kind !== 'image' ? ' selected' : ''}>Text</option>
            <option value="image"${cell.kind === 'image' ? ' selected' : ''}>Image</option>
        </select></div>`;
    if (cell.kind === 'image') {
        h += imageFieldHtml(cell.image_url, kind, i, side);
        h += `<input class="qe-input" style="margin-top:7px;" value="${escAttr(cell.text || '')}" placeholder="Caption (optional)" oninput="onCellText('${kind}',${i},${sideArg},this.value)">`;
    } else {
        h += `<input class="qe-input" value="${escAttr(cell.text || '')}" placeholder="Text" oninput="onCellText('${kind}',${i},${sideArg},this.value)">`;
    }
    return h + '</div>';
}
function imageFieldHtml(url, kind, i, side) {
    const sideArg = side ? `'${side}'` : 'null';
    let h = `<button type="button" class="qe-mini-btn" onclick="pickCellImage('${kind}',${i},${sideArg})"><i class="fas fa-image"></i> ${url ? 'Change image' : 'Choose image'}</button>`;
    if (url) h += `<img class="qe-cell-thumb" src="${escAttr(url)}" alt="">`;
    return h;
}
function onCellKind(kind, i, side, v) { _cellRef(kind, i, side).kind = v; renderBody(); }
function onCellText(kind, i, side, v) { _cellRef(kind, i, side).text = v; }
function pickCellImage(kind, i, side) {
    openQuizImagePicker(url => { const c = _cellRef(kind, i, side); c.image_url = url; if (kind !== 'i') c.kind = 'image'; renderBody(); });
}
function cleanCell(c) {
    if (!c) return null;
    if (c.kind === 'image') { const u = (c.image_url || '').trim(); return u ? { kind: 'image', image_url: u, text: (c.text || '').trim() } : null; }
    const tx = (c.text || '').trim();
    return tx ? { kind: 'text', text: tx } : null;
}

// ── matching ────────────────────────────────────────────────────────────────
function addPair() { _editing.config.pairs.push({ left: emptyCell(), right: emptyCell() }); renderBody(); }
function removePair(i) {
    if (_editing.config.pairs.length <= 2) { alert('Keep at least two pairs.'); return; }
    _editing.config.pairs.splice(i, 1); renderBody();
}

// ── ordering ──────────────────────────────────────────────────────────────--
function addOrderItem() { _editing.config.items.push(emptyCell()); renderBody(); }
function removeOrderItem(i) {
    if (_editing.config.items.length <= 2) { alert('Keep at least two items.'); return; }
    _editing.config.items.splice(i, 1); renderBody();
}
function moveOrder(i, dir) {
    const a = _editing.config.items, j = i + dir;
    if (j < 0 || j >= a.length) return;
    const t = a[i]; a[i] = a[j]; a[j] = t; renderBody();
}

// ── image choice ─────────────────────────────────────────────────────────--
function onImgMultiple(c) {
    _editing.config.multiple = c;
    if (!c) { let seen = false; (_editing.config.options || []).forEach(o => { if (o.correct) { if (seen) o.correct = false; else seen = true; } }); }
    renderBody();
}
function onImgCorrect(i, multiple) {
    const opts = _editing.config.options;
    if (multiple) opts[i].correct = !opts[i].correct;
    else opts.forEach((o, j) => o.correct = (j === i));
}
function onImgCaption(i, v) { _editing.config.options[i].caption = v; }
function addImgOption() { _editing.config.options.push({ image_url: '', caption: '', correct: false }); renderBody(); }
function removeImgOption(i) {
    if (_editing.config.options.length <= 2) { alert('Keep at least two images.'); return; }
    _editing.config.options.splice(i, 1); renderBody();
}

// ── image library picker ────────────────────────────────────────────────────
let _qpCb = null;
function openQuizImagePicker(cb) { _qpCb = cb; document.getElementById('qpOverlay').style.display = 'flex'; qpLoadRoot(); }
function closeQuizPicker() { document.getElementById('qpOverlay').style.display = 'none'; _qpCb = null; }
function qpUseUrl() { const u = prompt('Paste an image URL:'); if (u && u.trim()) { const cb = _qpCb; closeQuizPicker(); if (cb) cb(u.trim()); } }
async function qpLoadRoot() {
    const b = document.getElementById('qpBody'); b.innerHTML = 'Loading…';
    try { const d = await (await fetch('/admin/assets/root?type=image')).json(); qpRender(d.folders || [], d.assets || [], false); }
    catch (e) { b.innerHTML = '<div style="color:#ff6b6b;">Failed to load images.</div>'; }
}
async function qpLoadFolder(id) {
    const b = document.getElementById('qpBody'); b.innerHTML = 'Loading…';
    try { const d = await (await fetch('/admin/assets/folder/' + id + '?type=image')).json(); qpRender([], d.assets || [], true); }
    catch (e) { b.innerHTML = '<div style="color:#ff6b6b;">Failed to load folder.</div>'; }
}
function qpRender(folders, assets, inFolder) {
    const b = document.getElementById('qpBody'); let h = '';
    if (inFolder) h += '<button class="qp-folder" data-back="1"><i class="fas fa-arrow-left"></i> Back</button>';
    if (folders.length) { h += '<div style="margin-bottom:10px;">'; folders.forEach(f => { h += `<button class="qp-folder" data-folder="${f.id}"><i class="fas fa-folder"></i> ${escAttr(f.name)}</button>`; }); h += '</div>'; }
    if (assets.length) { h += '<div class="qp-grid">'; assets.forEach(a => { h += `<div class="qp-item" data-url="${escAttr(a.url)}"><img src="${escAttr(a.thumbnail_url || a.url)}" alt=""></div>`; }); h += '</div>'; }
    else if (!folders.length) { h += '<p style="color:rgba(255,255,255,0.4);">No images here.</p>'; }
    b.innerHTML = h;
    b.querySelectorAll('[data-back]').forEach(el => el.addEventListener('click', qpLoadRoot));
    b.querySelectorAll('[data-folder]').forEach(el => el.addEventListener('click', () => qpLoadFolder(parseInt(el.dataset.folder))));
    b.querySelectorAll('.qp-item').forEach(el => el.addEventListener('click', () => qpPick(el.dataset.url)));
}
function qpPick(u) { const cb = _qpCb; closeQuizPicker(); if (cb) cb(u); }

async function saveQuestion() {
    const prompt = document.getElementById('qPrompt').value.trim();
    if (!prompt) { alert('Question prompt is required'); return; }
    const t = _editing.question_type;
    let config;
    if (t === 'short_text') {
        const accepted = (_editing.config.accepted || []).map(a => (a || '').trim()).filter(Boolean);
        if (!accepted.length) { alert('Add at least one accepted answer.'); return; }
        config = { accepted, case_sensitive: document.getElementById('qCaseSensitive').checked };
    } else if (t === 'fill_blank') {
        const n = (prompt.match(/_{3,}/g) || []).length;
        if (n < 1) { alert('Mark at least one blank by typing 3+ underscores (___) in the prompt.'); return; }
        const blanks = [];
        for (let i = 0; i < n; i++) {
            const b = (_editing.config.blanks || [])[i] || { accepted: [] };
            const acc = (b.accepted || []).map(a => (a || '').trim()).filter(Boolean);
            if (!acc.length) { alert('Blank ' + (i + 1) + ' needs at least one accepted answer.'); return; }
            blanks.push({ accepted: acc, case_sensitive: !!b.case_sensitive });
        }
        config = { blanks };
    } else if (t === 'matching') {
        const pairs = (_editing.config.pairs || [])
            .map(p => ({ left: cleanCell(p.left), right: cleanCell(p.right) }))
            .filter(p => p.left && p.right);
        if (pairs.length < 2) { alert('Add at least two complete pairs (each with an item and a match).'); return; }
        config = { pairs };
    } else if (t === 'ordering') {
        const items = (_editing.config.items || []).map(cleanCell).filter(Boolean);
        if (items.length < 2) { alert('Add at least two items to order.'); return; }
        config = { items };
    } else if (t === 'image_choice') {
        const opts = (_editing.config.options || [])
            .map(o => ({ image_url: (o.image_url || '').trim(), caption: (o.caption || '').trim(), correct: !!o.correct }))
            .filter(o => o.image_url);
        if (opts.length < 2) { alert('Add at least two images.'); return; }
        const cc = opts.filter(o => o.correct).length;
        if (!_editing.config.multiple && cc !== 1) { alert('Pick exactly one correct image.'); return; }
        if (_editing.config.multiple && cc < 1) { alert('Mark at least one correct image.'); return; }
        config = { multiple: !!_editing.config.multiple, options: opts };
    } else if (t === 'coding') {
        const language = _editing.config.language;
        if (!CODE_LANGS[language]) { alert('Choose a language.'); return; }
        const mode = (_editing.config.mode === 'compile') ? 'compile' : 'run';
        config = { language, mode, starter_code: _editing.config.starter_code || '' };
        if (mode === 'run') {
            const cases = (_editing.config.test_cases || [])
                .map(tc => ({ stdin: tc.stdin || '', expected: tc.expected || '' }))
                .filter(tc => (tc.expected || '').trim() !== '');
            if (!cases.length) { alert('Add at least one test case with an expected output.'); return; }
            config.test_cases = cases;
        }
    } else {
        const opts = (_editing.config.options || [])
            .map((o, i) => ({ id: i + 1, text: (o.text || '').trim(), correct: !!o.correct }))
            .filter(o => o.text);
        if (opts.length < 2) { alert('Add at least two options.'); return; }
        const correctCount = opts.filter(o => o.correct).length;
        if (t !== 'multi_choice' && correctCount !== 1) { alert('Pick exactly one correct option.'); return; }
        if (t === 'multi_choice' && correctCount < 1) { alert('Mark at least one option correct.'); return; }
        config = { options: opts };
    }
    const body = {
        id: _editing.id, question_type: t, prompt, config,
        points: parseInt(document.getElementById('qPoints').value) || 1,
    };
    const r = await fetch(`/admin/quizzes/${QUIZ_ID}/questions/save`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
    });
    const d = await r.json();
    if (!d.success) { alert(d.error || 'Failed to save'); return; }
    const q = d.question;
    const idx = QUESTIONS.findIndex(x => x.id === q.id);
    if (idx >= 0) QUESTIONS[idx] = q; else QUESTIONS.push(q);
    QUESTIONS.sort((a, b) => a.sort_order - b.sort_order);
    _editing = JSON.parse(JSON.stringify(q));
    renderList();
    showForm();
}

async function deleteQuestion() {
    if (!_editing || !_editing.id) return;
    if (!confirm('Delete this question?')) return;
    const r = await fetch(`/admin/quizzes/${QUIZ_ID}/questions/${_editing.id}/delete`, { method: 'POST' });
    const d = await r.json();
    if (!d.success) { alert(d.error || 'Failed to delete'); return; }
    QUESTIONS = QUESTIONS.filter(x => x.id !== _editing.id);
    _editing = null;
    document.getElementById('qForm').style.display = 'none';
    document.getElementById('qPlaceholder').style.display = 'block';
    renderList();
}
</script>
