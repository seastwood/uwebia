{% extends 'public_base.html' %}

{% block title %}
Create Forum Account
{% endblock %}

{% block head %}
    <style>
        .forum-auth {
            width: min(460px, calc(100% - 28px));
            margin: 110px auto;
            padding: 22px;
            background: rgba(0,0,0,0.65);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 20px;
            color: #ffffff;
            box-shadow: 0 8px 28px rgba(0,0,0,0.38);
            -webkit-backdrop-filter: blur(14px);
            backdrop-filter: blur(14px);
        }

        input {
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 12px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.22);
            padding: 12px;
            background: rgba(0,0,0,0.5);
            color: #ffffff;
            font: inherit;
        }
        input::placeholder { color: rgba(255,255,255,0.55); }

        button {
            padding: 10px 14px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.22);
            background: rgba(0,0,0,0.55);
            color: #ffffff;
            font-weight: 800;
            cursor: pointer;
        }
    </style>
{% endblock %}

{% block content %}
    <form class="forum-auth" method="POST">
        <h1>Create Account</h1>

        <input name="first_name" placeholder="First name (optional)" autocomplete="given-name">
        <input name="last_name" placeholder="Last name (optional)" autocomplete="family-name">
        <input name="username" placeholder="Username" required>
        <input name="email" type="email" placeholder="Email" required>
        <div class="pw-wrap">
            <input name="password" type="password" placeholder="Password" required>
            <button type="button" class="pw-toggle" onclick="pwToggle(this)" aria-label="Show password" tabindex="-1"><i class="fas fa-eye"></i></button>
        </div>

        <button type="submit">Create Account</button>
    </form>
{% endblock %}
