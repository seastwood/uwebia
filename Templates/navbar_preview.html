<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">

    <style>
        html,
        body {
            margin: 0;
            min-height: 160px;
            overflow: hidden;

            color: {{ website.text_color or '#000000' }};
            font-family: 'Roboto', sans-serif;
        }

        body {
            padding-top: 58px;

            background-color: {{ website.background_color or '#ffffff' }};

            {% if website.background_image_url %}
                background-image: url("{{ website.background_image_url }}");

                {% set bg_zoom = website.background_image_zoom or 100 %}
                {% set repeat_zoom_multiplier = 2.0 %}
                {% set repeat_x = website.background_image_repeat_x %}

                {% if website.background_image_repeat %}
                    {% if repeat_x %}
                        background-repeat: repeat;
                        background-position: center top;
                        background-size: {{ (bg_zoom * repeat_zoom_multiplier)|round|int }}px auto;
                    {% else %}
                        background-repeat: repeat-y;
                        background-position: center top;
                        background-size: 100% auto;
                    {% endif %}
                {% else %}
                    background-repeat: no-repeat;
                    background-position: center;
                    background-size: {{ bg_zoom }}% auto;
                {% endif %}
            {% else %}
                background-image: none;
                background-repeat: no-repeat;
                background-position: center;
                background-size: cover;
            {% endif %}
        }

        .navbar-preview-spacer {
            height: 80px;
        }
    </style>
</head>

<body>
    {% include 'components/public_navbar.html' %}

    <div class="navbar-preview-spacer"></div>
</body>
</html>
