<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { margin: 0; padding: 0; min-height: 100vh; background: linear-gradient(135deg, #0d1117 0%, #161b22 100%); color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; display: flex; align-items: center; justify-content: center; }
        .ns-card { max-width: 460px; width: 92vw; padding: 36px 28px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.09); border-radius: 16px; text-align: center; box-shadow: 0 12px 32px rgba(0,0,0,0.35); }
        .ns-icon { font-size: 2.4rem; color: #5eeef8; margin-bottom: 14px; }
        .ns-heading { font-size: 1.3rem; font-weight: 700; margin: 0 0 12px; line-height: 1.35; }
        .ns-body { color: rgba(230,237,243,0.65); font-size: 0.95rem; line-height: 1.55; margin: 0 0 22px; }
        .ns-btn { display: inline-block; padding: 10px 22px; border-radius: 10px; background: linear-gradient(135deg,#5eeef8,#5eeec8); color: #111; font-weight: 700; text-decoration: none; border: none; cursor: pointer; font-size: 0.95rem; }
        .ns-btn:hover { opacity: 0.88; }
    </style>
</head>
<body>
<div class="ns-card">
    <div class="ns-icon"><i class="fas fa-envelope"></i></div>
    <h1 class="ns-heading">{{ heading }}</h1>
    <p class="ns-body">{{ body }}</p>
    {% if action_label and action_url %}
        {% if action_method == 'POST' %}
        <form method="POST" action="{{ action_url }}" style="margin:0;">
            <button type="submit" class="ns-btn">{{ action_label }}</button>
        </form>
        {% else %}
        <a class="ns-btn" href="{{ action_url }}">{{ action_label }}</a>
        {% endif %}
    {% endif %}
</div>
</body>
</html>
