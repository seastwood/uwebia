{% extends 'public_base.html' %}
{% block title %}{{ website.name }} — Offline{% endblock %}
{% block content %}
<style>
.offline-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    text-align: center;
    padding: 48px 24px;
}
.offline-icon {
    font-size: 2.4rem;
    opacity: 0.25;
    margin-bottom: 20px;
}
.offline-title {
    font-size: 1.5rem;
    font-weight: 700;
    margin: 0 0 10px;
    opacity: 0.8;
}
.offline-msg {
    font-size: 0.92rem;
    opacity: 0.4;
    max-width: 340px;
    line-height: 1.6;
    margin: 0;
}
</style>
<div class="offline-wrap">
    <div class="offline-icon"><i class="fas fa-moon"></i></div>
    <h1 class="offline-title">{{ website.name }}</h1>
    <p class="offline-msg">This site is temporarily offline. Check back soon.</p>
</div>
{% endblock %}
