<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/svg+xml" href="/static/uwebia-icon.svg">
    <title>No Site Found</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1e1c22;
            font-family: 'Roboto', sans-serif;
            color: rgba(255,255,255,0.7);
        }
        .container {
            text-align: center;
            padding: 40px 24px;
        }
        img { width: 48px; height: 48px; opacity: 0.6; margin-bottom: 24px; }
        h1 { font-size: 1.4rem; font-weight: 700; color: #fff; margin-bottom: 10px; }
        p { font-size: 0.92rem; margin-bottom: 24px; }
        a {
            display: inline-block;
            padding: 10px 20px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 10px;
            color: #5eeef8;
            text-decoration: none;
            font-size: 0.88rem;
            transition: background 0.2s;
        }
        a:hover { background: rgba(255,255,255,0.13); }
    </style>
</head>
<body>
    <div class="container">
        <img src="/static/uwebia-icon.svg" alt="Uwebia">
        <h1>No site configured yet</h1>
        <p>Set up your site from the dashboard to get started.</p>
        <a href="/admin/dashboard">Go to Dashboard</a>
    </div>
</body>
</html>
