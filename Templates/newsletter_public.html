{% extends 'public_base.html' %}
{% block content %}

<style>
.nlp-page {
    max-width: 760px;
    margin: 0 auto;
    padding: 32px 22px 80px;
    color: inherit;
}
.nlp-back {
    display: inline-flex; align-items: center; gap: 6px;
    color: inherit; opacity: 0.55; text-decoration: none;
    font-size: 0.85rem; margin-bottom: 16px;
}
.nlp-back:hover { opacity: 0.95; }

.nlp-kicker {
    font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.15em; opacity: 0.5; margin: 0 0 4px;
}
.nlp-meta {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    font-size: 0.82rem; opacity: 0.55; margin: 0 0 20px;
}

.nlp-title {
    font-size: clamp(1.7rem, 5vw, 2.4rem);
    font-weight: 800; line-height: 1.18;
    margin: 0 0 22px;
}

.nlp-body {
    font-size: 1rem; line-height: 1.78;
}
.nlp-body h1, .nlp-body h2, .nlp-body h3 {
    margin-top: 1.6em; margin-bottom: 0.5em; font-weight: 700; line-height: 1.3;
}
.nlp-body h1 { font-size: 1.7rem; }
.nlp-body h2 { font-size: 1.4rem; }
.nlp-body h3 { font-size: 1.2rem; }
.nlp-body p  { margin: 0 0 1em; }
.nlp-body ul, .nlp-body ol { margin: 0 0 1em 1.5em; }
.nlp-body li { margin-bottom: 0.4em; }
.nlp-body a  { color: #5eeef8; text-decoration: underline; }
.nlp-body img { max-width: 100%; height: auto; border-radius: 8px; }
.nlp-body blockquote {
    margin: 18px 0; padding: 8px 14px;
    border-left: 3px solid rgba(255,255,255,0.25);
    opacity: 0.85; font-style: italic;
}
.nlp-body pre, .nlp-body code {
    background: rgba(255,255,255,0.06);
    border-radius: 6px; padding: 2px 6px; font-size: 0.92em;
}
.nlp-body pre { padding: 12px 14px; overflow-x: auto; }

.nlp-signup-cta {
    margin-top: 36px; padding: 18px 20px; border-radius: 14px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    text-align: center;
}
.nlp-signup-cta a {
    display: inline-block; margin-top: 8px;
    padding: 9px 18px; border-radius: 10px;
    background: linear-gradient(135deg,#5eeef8,#5eeec8); color: #111;
    font-weight: 700; text-decoration: none;
}
.nlp-signup-cta a:hover { opacity: 0.88; }
</style>

<div class="nlp-page">
    <p class="nlp-kicker">{{ newsletter.name }}</p>
    <h1 class="nlp-title">{{ campaign.subject }}</h1>
    <div class="nlp-meta">
        {% if campaign.sent_at %}
            <span>{{ campaign.sent_at.strftime('%b %-d, %Y') }}</span>
        {% endif %}
    </div>

    <article class="nlp-body">
        {{ campaign.html_body | safe }}
    </article>

    <div class="nlp-signup-cta">
        <div style="font-size:0.9rem;opacity:0.7;">Want this in your inbox?</div>
        <a href="{{ url_for('public_register', website_prefix=website.url_prefix) if website else '#' }}#newsletter-{{ newsletter.slug }}">
            Subscribe to {{ newsletter.name }}
        </a>
    </div>
</div>

{% endblock %}
