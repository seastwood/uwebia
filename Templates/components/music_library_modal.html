{# Templates/components/music_library_modal.html #}


<div id="musicLibraryModal" class="modal library-modal" style="display:none;">
    <div class="modal-content library-modal-content">
        <span class="close library-modal-close" onclick="MusicLibraryModal.close()">&times;</span>

        <div class="library-container">
            <div class="library-header">
                <h2><i class="fas fa-music"></i> Select Music from Asset Library</h2>

                <p id="musicLibraryModalSubtitle" class="library-modal-subtitle">
                    Choose audio files to add to your music section.
                </p>

                <div class="modal-library-toolbar">
                    <button type="button" class="btn-primary"
                        onclick="document.getElementById('musicLibraryFileInput').click()">
                        <i class="fas fa-upload"></i>
                        Upload Music
                    </button>

                    <button type="button" class="btn-secondary" onclick="MusicLibraryModal.createFolder()">
                        <i class="fas fa-folder-plus"></i>
                        New Folder
                    </button>

                    <input
                        type="file"
                        id="musicLibraryFileInput"
                        multiple
                        accept="audio/*,.mp3,.wav,.ogg,.m4a,.aac"
                        style="display:none"
                        onchange="MusicLibraryModal.handleUpload(event)">
                </div>

                <div class="modal-upload-help">
                    These uploads go into your Asset Library under Audio.
                </div>

                <div class="upload-progress-wrapper" id="musicModalUploadProgressWrapper" style="display:none;">
                    <div class="upload-progress-bar">
                        <div class="upload-progress-fill" id="musicModalUploadProgressFill"></div>
                    </div>
                    <div class="upload-progress-text" id="musicModalUploadProgressText">0%</div>
                </div>
            </div>

            <div class="library-modal-section-label">Folders</div>
            <div id="musicModalFolderGrid" class="folder-grid"></div>

            <hr class="library-modal-divider">

            <div id="musicModalCurrentFolderName" class="library-modal-section-label">
                Root Audio
            </div>

            <div id="musicModalAudioGrid" class="music-modal-grid"></div>

            <div class="library-modal-footer">
                <span id="musicSelectionCount" class="library-selection-count">
                    0 tracks selected
                </span>

                <button id="musicLibraryConfirmButton"
                    class="library-confirm-button"
                    onclick="MusicLibraryModal.confirmSelection()">
                    Add Selected to Section
                </button>
            </div>
        </div>
    </div>
</div>
