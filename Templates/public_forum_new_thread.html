{% extends 'public_base.html' %}

{% block title %}
New Thread
{% endblock %}

{% block head %}
    <style>
        body {
            margin: 0;
            font-family: Roboto, Arial, sans-serif;
            background: {{ website.background_color or '#111' }};
            color: {{ website.text_color or '#fff' }};
        }

        .forum-shell {
            width: min(800px, calc(100% - 28px));
            margin: 96px auto 50px;
        }

        .forum-card {
            padding: 22px;
            background: rgba(0, 0, 0, 0.34);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
        }

        input,
        textarea {
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 12px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.18);
            padding: 12px;
            background: rgba(255,255,255,0.1);
            color: inherit;
            font: inherit;
        }

        textarea {
            min-height: 220px;
        }

        .forum-button {
            padding: 10px 14px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.16);
            background: rgba(255,255,255,0.12);
            color: inherit;
            font-weight: 800;
            cursor: pointer;
        }
    </style>
{% endblock %}

{% block content %}

    <main class="forum-shell">
        <form class="forum-card" method="POST">
            <h1>Start a Thread</h1>

            <input name="title" placeholder="Thread title" maxlength="180" required>
            <textarea name="body" placeholder="What do you want to talk about?" required></textarea>

            <button class="forum-button" type="submit">Post Thread</button>
        </form>
    </main>
{% endblock %}
