name: Build & Publish Docker image

on:
  push:
    branches:
      - main
      - development
    tags:
      - 'v*.*.*'
  # Lets you trigger a build manually from the Actions tab.
  workflow_dispatch:

# Stop in-progress builds from the same ref when a new commit lands.
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: setheastwood/uwebia

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU lets us build arm64 from an amd64 GitHub runner.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Buildx is needed for multi-arch + the GHA layer cache.
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Produces a sensible set of tags + OCI labels from the git ref:
      #   • push to main                → :main, :latest, :<sha>
      #   • push to feature branch      → :<branch-name>, :<sha>
      #   • push tag v1.2.3             → :1.2.3, :1.2, :1, :latest, :<sha>
      - name: Compute tags / labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          # Build for x86 servers + Apple Silicon / Raspberry Pi.
          platforms: linux/amd64,linux/arm64
          push: true
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub-hosted layer cache — first build is slow, subsequent
          # pushes only rebuild changed layers.
          cache-from: type=gha
          cache-to:   type=gha,mode=max
